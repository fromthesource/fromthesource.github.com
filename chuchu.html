<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🚀 Emoji Moji Rocket!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --orange:#FF8C00;--orange-dk:#CC6A00;
  --teal:#00C897;--teal-dk:#009970;
  --red:#FF3D5A;--red-dk:#CC1130;
  --blue:#3A86FF;--blue-dk:#1A56BB;
  --green:#4ADE80;--bg:#FFF8F0;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:none;user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Nunito',sans-serif;background:var(--bg);}
.screen{display:none;width:100%;height:100dvh;flex-direction:column;position:relative;}
.screen.active{display:flex;}

/* TITLE */
#screen-title{background:linear-gradient(160deg,#FFF0FB 0%,#FFF5E4 35%,#E8FFF0 65%,#EEF5FF 100%);align-items:center;justify-content:center;overflow:hidden;}
.rainbow-bg{position:absolute;inset:0;background:repeating-linear-gradient(135deg,rgba(255,107,157,.04) 0px,rgba(255,107,157,.04) 20px,rgba(255,165,0,.04) 20px,rgba(255,165,0,.04) 40px,rgba(74,222,128,.04) 40px,rgba(74,222,128,.04) 60px,rgba(58,134,255,.04) 60px,rgba(58,134,255,.04) 80px);}
.deco{position:absolute;font-size:var(--sz,36px);animation:floatDeco var(--d,5s) ease-in-out infinite var(--dl,0s);pointer-events:none;opacity:.65;}
@keyframes floatDeco{0%,100%{transform:translateY(0) rotate(var(--r0,0deg));}50%{transform:translateY(-16px) rotate(var(--r1,5deg));}}
.title-content{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;gap:10px;}
.t-mascots{display:flex;align-items:center;gap:12px;font-size:clamp(48px,11vw,76px);}
.t-mascots span{display:inline-block;animation:bm var(--d,1.2s) ease-in-out infinite var(--dl,0s);}
@keyframes bm{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-13px) scale(1.1);}}
.t-logo{font-family:'Fredoka One',cursive;font-size:clamp(26px,7vw,54px);text-align:center;line-height:1.1;background:linear-gradient(135deg,#FF6EC7 0%,#FF8C00 33%,#FFD700 66%,#4ADE80 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 2px 5px rgba(0,0,0,.1));}
.t-sub{font-size:clamp(11px,2.4vw,14px);color:#888;font-weight:800;text-align:center;background:rgba(255,255,255,.85);padding:6px 16px;border-radius:18px;max-width:300px;border:2px solid rgba(0,0,0,.06);}
.t-btns{display:flex;flex-direction:column;gap:9px;align-items:center;margin-top:5px;}
.big-btn{font-family:'Fredoka One',cursive;font-size:clamp(15px,3.8vw,21px);padding:12px 42px;border:none;border-radius:50px;cursor:pointer;transition:transform .12s,box-shadow .12s;box-shadow:0 5px 0 rgba(0,0,0,.17);position:relative;top:0;}
.big-btn:active{transform:translateY(4px);box-shadow:0 1px 0 rgba(0,0,0,.17);top:4px;}
.bb-play{background:linear-gradient(135deg,#FF6EC7,#FF8C00);color:white;}
.bb-how{background:linear-gradient(135deg,#4ADE80,#00C897);color:white;}
.t-lang{display:flex;gap:7px;margin-top:3px;}
.langbtn{font-family:'Fredoka One',cursive;font-size:12px;padding:5px 13px;border:2px solid rgba(0,0,0,.1);border-radius:18px;background:white;color:#BBB;cursor:pointer;transition:all .14s;}
.langbtn.on,.langbtn:hover{border-color:var(--orange);color:var(--orange);}

/* LEVELS */
#screen-levels{background:linear-gradient(160deg,#FFF0FB,#FFF5E4,#E8FFF0);overflow-y:auto;align-items:center;}
.lvl-top{width:100%;max-width:700px;display:flex;align-items:center;gap:10px;padding:12px 14px 6px;position:sticky;top:0;background:linear-gradient(180deg,#FFF0FB 80%,transparent);z-index:10;}
.lvl-top h1{font-family:'Fredoka One',cursive;font-size:clamp(17px,4vw,26px);color:var(--orange);flex:1;text-align:center;}
.bk-btn{font-family:'Fredoka One',cursive;font-size:13px;padding:6px 13px;border:3px solid #EEE;border-radius:13px;background:white;color:#AAA;cursor:pointer;flex-shrink:0;}
.bk-btn:active{transform:scale(.92);}
.set-tabs{display:flex;gap:7px;width:100%;max-width:700px;padding:0 14px 10px;flex-wrap:wrap;justify-content:center;}
.stab{font-family:'Fredoka One',cursive;font-size:13px;padding:8px 18px;border:3px solid #DDD;border-radius:50px;background:white;color:#BBB;cursor:pointer;transition:all .14s;box-shadow:0 3px 0 #DDD;}
.stab.on{background:linear-gradient(135deg,#FF6EC7,#FF8C00);border-color:transparent;color:white;box-shadow:0 3px 0 rgba(255,110,199,.4);}
.stab.locked-set{opacity:.45;cursor:not-allowed;}
.lvl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(94px,1fr));gap:9px;width:100%;max-width:700px;padding:0 14px 28px;}
.lcard{background:white;border:3px solid #EEE;border-radius:14px;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:transform .14s,box-shadow .14s;box-shadow:0 4px 0 #DDD;position:relative;}
.lcard.avail{cursor:pointer;}
.lcard.avail:active{transform:translateY(3px);box-shadow:0 1px 0 #DDD;}
.lcard.avail:hover{transform:translateY(-3px) scale(1.04);border-color:#FFBBDD;}
.lcard.locked{opacity:.45;cursor:not-allowed;filter:grayscale(.6);}
.lcard.locked::before{content:'🔒';position:absolute;top:5px;right:5px;font-size:13px;}
.lcard.done{border-color:#4ADE80;box-shadow:0 4px 0 #22c55e;}
.lcard.done .lcn{color:#22c55e;}
.lcard.done::after{content:'⭐';position:absolute;top:-8px;right:-8px;font-size:17px;filter:drop-shadow(0 2px 3px rgba(0,0,0,.14));}
.lcard .lcn{font-family:'Fredoka One',cursive;font-size:24px;color:var(--orange);line-height:1;}
.lcard .lct{font-size:7px;font-weight:700;color:#CCC;text-align:center;text-transform:uppercase;letter-spacing:.4px;padding:0 4px;line-height:1.3;}

/* GAME */
#screen-game{background:var(--bg);}
.g-top{background:linear-gradient(90deg,#FF6EC7,#FF8C00,#FFD700);padding:6px 10px;display:flex;align-items:center;justify-content:space-between;gap:6px;box-shadow:0 3px 0 rgba(0,0,0,.12);flex-shrink:0;}
.g-top .gb{font-family:'Fredoka One',cursive;font-size:12px;padding:5px 11px;border:none;border-radius:16px;cursor:pointer;background:rgba(255,255,255,.32);color:white;transition:all .1s;white-space:nowrap;flex-shrink:0;}
.g-top .gb:active{transform:scale(.9);}
.g-lvl-title{font-family:'Fredoka One',cursive;font-size:clamp(10px,2.4vw,15px);color:white;text-align:center;flex:1;padding:0 4px;line-height:1.2;text-shadow:0 1px 3px rgba(0,0,0,.18);}
.palette{background:white;border-bottom:3px solid #F0E0D0;padding:5px 8px;display:flex;align-items:center;gap:4px;flex-shrink:0;overflow-x:auto;}
.palette::-webkit-scrollbar{display:none;}
.pal-pills{display:flex;gap:4px;flex-shrink:0;}
.apill{display:flex;flex-direction:column;align-items:center;justify-content:center;width:46px;height:46px;border-radius:11px;border:3px solid #EEE;background:white;cursor:grab;transition:all .13s;gap:1px;flex-shrink:0;box-shadow:0 3px 0 #DDD;}
.apill.sel{border-color:var(--blue);background:#EBF5FF;box-shadow:0 3px 0 var(--blue-dk);}
.apill.mpty{opacity:.28;cursor:not-allowed;}
.apill .ai{font-size:21px;line-height:1;}
.apill .ac{font-family:'Fredoka One',cursive;font-size:11px;color:#CCC;line-height:1;}
.apill.sel .ac{color:var(--blue);}
.epill{width:46px;height:46px;border-radius:11px;border:3px solid #EEE;background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:21px;transition:all .13s;flex-shrink:0;box-shadow:0 3px 0 #DDD;}
.epill.sel{border-color:var(--red);background:#FFEBEB;box-shadow:0 3px 0 var(--red-dk);}
.pal-right{display:flex;gap:4px;margin-left:auto;flex-shrink:0;}
.go-btn{font-family:'Fredoka One',cursive;font-size:13px;padding:9px 14px;border:none;border-radius:38px;cursor:pointer;transition:transform .1s,box-shadow .1s;white-space:nowrap;}
.go-btn:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.14)!important;}
.go{background:linear-gradient(135deg,#4ADE80,#00C897);color:white;box-shadow:0 4px 0 #009970;}
.stop{background:linear-gradient(135deg,#FF3D5A,#CC1130);color:white;display:none;box-shadow:0 4px 0 #880020;}
.speed{background:linear-gradient(135deg,#A855F7,#7C3AED);color:white;box-shadow:0 4px 0 #5B21B6;display:none;}
.sound-btn{font-size:18px;background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:8px;flex-shrink:0;}
.epill.dragover{border-color:var(--red);background:#FFEBEB;transform:scale(1.15);}
#dragGhost{position:fixed;pointer-events:none;z-index:9999;width:48px;height:48px;background:white;border:3px solid var(--blue);border-radius:12px;display:none;align-items:center;justify-content:center;font-size:24px;box-shadow:0 8px 24px rgba(0,0,0,.18);transform:translate(-50%,-50%);}
.game-area{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
#gameCanvas{display:block;cursor:crosshair;}
.sbar{background:white;border-top:3px solid #F0E0D0;padding:5px 10px;display:flex;gap:4px;align-items:center;flex-shrink:0;justify-content:space-around;}
.si{display:flex;align-items:center;gap:4px;}
.si .ico{font-size:17px;line-height:1;}
.si .val{font-family:'Fredoka One',cursive;font-size:17px;line-height:1;}
.vg{color:var(--teal);}.vr{color:var(--red);}.vb{color:var(--blue);}.vo{color:var(--orange);}
.si-lbl{font-size:7px;font-weight:700;color:#DDD;text-transform:uppercase;letter-spacing:.3px;}

/* OVERLAYS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:200;backdrop-filter:blur(5px);}
.overlay.show{display:flex;}
.ov-card{background:white;border-radius:24px;padding:24px 30px;display:flex;flex-direction:column;align-items:center;gap:11px;max-width:310px;width:90%;box-shadow:0 14px 44px rgba(0,0,0,.18);animation:pop-in .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes pop-in{from{transform:scale(.4) rotate(-8deg);opacity:0;}to{transform:scale(1) rotate(0);opacity:1;}}
.ov-emoji{font-size:62px;line-height:1;}
.ov-title{font-family:'Fredoka One',cursive;font-size:30px;text-align:center;line-height:1;}
.ov-title.win{background:linear-gradient(90deg,#FF6EC7,#FF8C00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.ov-title.lose{color:var(--red);}
.ov-stars{font-size:34px;letter-spacing:4px;line-height:1;animation:sp .5s .25s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes sp{from{transform:scale(0);opacity:0;}to{transform:scale(1);opacity:1;}}
.ov-msg{font-size:13px;color:#AAA;font-weight:700;text-align:center;line-height:1.6;white-space:pre-line;}
.ov-btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:2px;}
.ov-btn{font-family:'Fredoka One',cursive;font-size:14px;padding:10px 20px;border:none;border-radius:38px;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.12);}
.ov-btn:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.12);}
.onext{background:linear-gradient(135deg,#4ADE80,#00C897);color:white;box-shadow:0 4px 0 #009970;}
.oretry{background:linear-gradient(135deg,#FF8C00,#FF6EC7);color:white;box-shadow:0 4px 0 #cc6a00;}
.olvls{background:#F5F5F5;color:#999;box-shadow:0 4px 0 #DDD;border:2px solid #EEE;}
.htr{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:700;color:#666;}
.htr span:first-child{font-size:23px;width:34px;text-align:center;flex-shrink:0;}
.htitle{font-family:'Fredoka One',cursive;font-size:25px;background:linear-gradient(90deg,#FF6EC7,#FF8C00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.flash{position:fixed;inset:0;pointer-events:none;z-index:150;opacity:0;transition:opacity .1s;}
.flash.fr{background:rgba(255,30,60,.3);}.flash.fg{background:rgba(0,200,150,.24);}
.flash.show{opacity:1;}
</style>
</head>
<body>

<div id="screen-title" class="screen active">
  <div class="rainbow-bg"></div>
  <div class="deco" style="top:7%;left:5%;--sz:38px;--d:4s;--dl:.2s;--r0:-8deg;--r1:8deg">🌈</div>
  <div class="deco" style="top:11%;right:6%;--sz:34px;--d:5s;--dl:1s;--r0:5deg;--r1:-5deg">⭐</div>
  <div class="deco" style="top:22%;left:16%;--sz:28px;--d:3.5s;--dl:.5s;--r0:-5deg;--r1:10deg">🎈</div>
  <div class="deco" style="top:14%;right:22%;--sz:32px;--d:4.5s;--dl:1.5s;--r0:0deg;--r1:-8deg">✨</div>
  <div class="deco" style="bottom:22%;left:8%;--sz:30px;--d:6s;--dl:.8s;--r0:4deg;--r1:-4deg">🌟</div>
  <div class="deco" style="bottom:18%;right:10%;--sz:36px;--d:4s;--dl:2s;--r0:-6deg;--r1:6deg">🎉</div>
  <div class="deco" style="bottom:28%;left:24%;--sz:26px;--d:5.5s;--dl:.3s;--r0:0deg;--r1:10deg">💫</div>
  <div class="deco" style="top:36%;right:4%;--sz:24px;--d:3s;--dl:1.2s;--r0:-4deg;--r1:4deg">🌸</div>
  <div class="title-content">
    <div class="t-mascots">
      <span style="--d:1.1s;--dl:0s">🤨</span>
      <span style="--d:1.1s;--dl:.22s">🚀</span>
      <span style="--d:1.1s;--dl:.44s">😈</span>
    </div>
    <div class="t-logo">Emoji Moji<br>Rocket!</div>
    <div class="t-sub" id="t-sub-text"></div>
    <div class="t-btns">
      <button class="big-btn bb-play" onclick="showLevels()" id="btn-play"></button>
      <button class="big-btn bb-how"  onclick="showHowTo()" id="btn-how"></button>
    </div>
    <div class="t-lang">
      <button class="langbtn" onclick="setLang('es')">🇪🇸 ES</button>
      <button class="langbtn" onclick="setLang('en')">🇬🇧 EN</button>
    </div>
  </div>
</div>

<div id="screen-levels" class="screen">
  <div class="rainbow-bg"></div>
  <div class="lvl-top">
    <button class="bk-btn" onclick="showTitle()">← <span class="lstr-home"></span></button>
    <h1 class="lstr-pick"></h1>
    <div style="width:66px"></div>
  </div>
  <div class="set-tabs" id="setTabs"></div>
  <div class="lvl-grid" id="lvlGrid"></div>
</div>

<div id="screen-game" class="screen">
  <div class="g-top">
    <button class="gb" onclick="exitGame()">← <span class="lstr-exit"></span></button>
    <div class="g-lvl-title" id="gTitle">Level</div>
    <button class="gb" onclick="resetLevel()">↺ <span class="lstr-reset"></span></button>
  </div>
  <div class="palette">
    <div class="pal-pills" id="palPills"></div>
    <div class="epill" id="erasePill" onclick="selectErase()">🗑️</div>
    <div class="pal-right">
      <button class="sound-btn" id="soundBtn" onclick="toggleSound()">🔊</button>
      <button class="go-btn go"    id="goBtn"    onclick="startSim()">▶ GO!</button>
      <button class="go-btn stop"  id="stopBtn"  onclick="stopSim()">■</button>
      <button class="go-btn speed" id="speedBtn" onclick="toggleSpeed()">⚡x1</button>
    </div>
  </div>
  <div class="game-area"><canvas id="gameCanvas"></canvas></div>
  <div class="sbar">
    <div class="si"><span class="ico">😐</span><div><div class="val vo" id="sc-mice">0</div><div class="si-lbl lstr-good"></div></div></div>
    <div class="si"><span class="ico">🚀</span><div><div class="val vg" id="sc-saved">0</div><div class="si-lbl lstr-saved"></div></div></div>
    <div class="si"><span class="ico">💀</span><div><div class="val vr" id="sc-eaten">0</div><div class="si-lbl lstr-lost"></div></div></div>
    <div class="si"><span class="ico">😈</span><div><div class="val vb" id="sc-cats">0</div><div class="si-lbl lstr-bad"></div></div></div>
  </div>
</div>

<div class="overlay" id="winOv">
  <div class="ov-card">
    <div class="ov-emoji">🎉</div>
    <div class="ov-title win lstr-win-title"></div>
    <div class="ov-stars" id="winStars">⭐⭐⭐</div>
    <div class="ov-msg" id="winMsg"></div>
    <div class="ov-btns">
      <button class="ov-btn onext"  onclick="nextLevel()"  id="btn-next"></button>
      <button class="ov-btn oretry" onclick="retryLevel()" id="btn-retry"></button>
    </div>
  </div>
</div>

<div class="overlay" id="loseOv">
  <div class="ov-card">
    <div class="ov-emoji">😈</div>
    <div class="ov-title lose lstr-lose-title"></div>
    <div class="ov-msg" id="loseMsg"></div>
    <div class="ov-btns">
      <button class="ov-btn oretry" onclick="retryLevel()" id="btn-retry2"></button>
      <button class="ov-btn olvls"  onclick="exitGame()"   id="btn-levels"></button>
    </div>
  </div>
</div>

<div class="overlay" id="howOv">
  <div class="ov-card">
    <div class="htitle" id="howTitle"></div>
    <div style="display:flex;flex-direction:column;gap:8px;width:100%" id="howtoRows"></div>
    <button class="ov-btn onext" id="btn-got-it" onclick="document.getElementById('howOv').classList.remove('show')"></button>
  </div>
</div>

<div id="dragGhost"></div>
<div class="flash fr" id="fR"></div>
<div class="flash fg" id="fG"></div>

<script>
// ── SOUND ──────────────────────────────────────────────────
let audioCtx=null,soundOn=true;
function getAC(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function tone(freq,type,dur,vol,delay=0){
  if(!soundOn)return;
  try{const c=getAC(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);
    o.type=type;o.frequency.setValueAtTime(freq,c.currentTime+delay);
    g.gain.setValueAtTime(vol,c.currentTime+delay);
    g.gain.exponentialRampToValueAtTime(.001,c.currentTime+delay+dur);
    o.start(c.currentTime+delay);o.stop(c.currentTime+delay+dur+.01);}catch(e){}
}
function chord(fs,dur,vol){fs.forEach((f,i)=>tone(f,'sine',dur,vol,i*.02));}
const SFX={
  place:()=>tone(660,'square',.08,.14),
  erase:()=>tone(200,'sawtooth',.1,.1),
  save: ()=>chord([523,659,784],.25,.17),
  die:  ()=>{tone(150,'sawtooth',.3,.18);tone(100,'sawtooth',.3,.1,.15);},
  win:  ()=>[523,587,659,698,784,880,988,1047].forEach((f,i)=>tone(f,'sine',.18,.18,i*.08)),
  lose: ()=>[300,250,200,150].forEach((f,i)=>tone(f,'sawtooth',.2,.14,i*.1)),
  click:()=>tone(440,'square',.05,.1),
  go:   ()=>chord([330,440,550],.2,.18),
  drop: ()=>{tone(528,'sine',.1,.14);tone(660,'sine',.1,.1,.08);},
  lock: ()=>tone(180,'square',.12,.15),
};
function toggleSound(){soundOn=!soundOn;document.getElementById('soundBtn').textContent=soundOn?'🔊':'🔇';}
function wakeAudio(){try{if(!audioCtx)getAC();if(audioCtx.state==='suspended')audioCtx.resume();}catch(e){}}

// ── I18N ──────────────────────────────────────────────────
const LANGS={
  es:{sub:'¡Guía a los emojis buenos al cohete y escapa de los malos!',play:'▶ JUGAR',how:'❓ Cómo jugar',home:'Inicio',pick:'¡Elige un nivel!',exit:'Salir',reset:'Reset',good:'buenos',saved:'salvados',lost:'perdidos',bad:'malos','win-title':'¡GENIAL!','lose-title':'¡Oh, no!',next:'Siguiente →',retry:'↺ De nuevo',retry2:'↺ Intentar',levels:'🗺 Niveles','got-it':'¡Entendido!',howTitle:'Cómo Jugar',
    winMsg:(s,t,e)=>`¡${s} de ${t} emojis salvados!`+(e>0?`\n${e} no llegaron... 😔`:''),

// ── PROGRESS ───────────────────────────────────────────────
const PS=()=>{try{return JSON.parse(localStorage.getItem('emr3')||'{}');}catch{return{};}};
const SAVE=(si,li)=>{const p=PS();if(!p[si])p[si]={};p[si][li]=1;localStorage.setItem('emr3',JSON.stringify(p));};
const DONE=(si,li)=>{const p=PS();return!!(p[si]&&p[si][li]);};
function unlocked(si,li){
  if(si===0&&li===0)return true;
  if(li>0)return DONE(si,li-1);
  return SETS[si-1].levels.every((_,j)=>DONE(si-1,j));
}
function setUnlocked(si){
  if(si===0)return true;
  return SETS[si-1].levels.every((_,j)=>DONE(si-1,j));
}

// ── ORIENTATION ────────────────────────────────────────────
// Landscape = 12×9, Portrait = 9×12 (rotate board 90° CCW)
// Portrait transform: base(bx,by) → (by, GW0-1-bx) = (by, 11-bx)
let portrait=false;
let GW=GW0, GH=GH0;
function detectOri(){
  portrait=window.innerHeight>window.innerWidth;
  GW=portrait?GH0:GW0;  // 9 or 12
  GH=portrait?GW0:GH0;  // 12 or 9
}
// CCW 90°: (bx,by) → (by, GW0-1-bx)
function rotPt(bx,by){return portrait?[by,GW0-1-bx]:[bx,by];}
// Direction rotation CCW 90°: 0R→3U, 1D→0R, 2L→1D, 3U→2L  ... wait:
// We rotate the board CCW 90°, entities should also turn CCW
// CCW 90°: right(0)→up(3), down(1)→right(0), left(2)→down(1), up(3)→left(2)
function rotDir(d){return portrait?((d+3)%4):d;}
// Arrow alloc reordering for portrait: alloc[0=R,1=D,2=L,3=U]
// After CCW rotation: what was right is now up etc.
// new alloc[3=U]=old[0=R], new[0=R]=old[1=D], new[1=D]=old[2=L], new[2=L]=old[3=U]
function rotAlloc(a){return portrait?[a[1],a[2],a[3],a[0]]:a;}

function showSc(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

function showLevels(){stopSim();hideOvs();showSc('screen-levels');buildLvlUI();}

function hideOvs(){['winOv','loseOv','howOv'].forEach(id=>document.getElementById(id).classList.remove('show'));}

function buildLvlUI(){
  const tabs=document.getElementById('setTabs');tabs.innerHTML='';
  SETS.forEach((s,i)=>{
    const su=setUnlocked(i);
    const b=document.createElement('button');
    b.className='stab'+(i===curSet?' on':'')+(su?'':' locked-set');
    b.textContent=su?s.name:'🔒 '+s.name;
    b.onclick=()=>{if(!su){SFX.lock();return;}SFX.click();curSet=i;buildLvlUI();};
    tabs.appendChild(b);
  });
  const grid=document.getElementById('lvlGrid');grid.innerHTML='';
  SETS[curSet].levels.forEach((lvl,i)=>{
    const done=DONE(curSet,i),avail=unlocked(curSet,i);
    const c=document.createElement('div');
    c.className='lcard '+(done?'done ':'')+( avail?'avail':'locked');
    c.innerHTML=`<div class="lcn">${i+1}</div><div class="lct">${lvl.name}</div>`;
    c.onclick=()=>{if(!avail){SFX.lock();return;}SFX.click();startLevel(curSet,i);};
    grid.appendChild(c);
  });
}

// ── LEVEL LOAD ─────────────────────────────────────────────
function startLevel(si,li){
  curSet=si;curLvl=li;hideOvs();showSc('screen-game');
  speedMult=1;tickCount=0;
  document.getElementById('speedBtn').textContent='⚡x1';
  detectOri();
  const lvl=SETS[si].levels[li];
  document.getElementById('gTitle').textContent=`${lvl.name} — ${SETS[si].name} ${li+1}/${SETS[si].levels.length}`;
  loadData(lvl);
  placed={};used=[0,0,0,0];
  stopSim();resizeCv();draw(0);buildPillsUI();updateScore();startIdleShake();
}

function loadData(lvl){
  // build base (landscape) walls
  const bvW=Array.from({length:GW0+1},()=>Array(GH0).fill(false));
  const bhW=Array.from({length:GW0},()=>Array(GH0+1).fill(false));
  for(let y=0;y<GH0;y++){bvW[0][y]=bvW[GW0][y]=true;}
  for(let x=0;x<GW0;x++){bhW[x][0]=bhW[x][GH0]=true;}
  pstr(lvl.vW).forEach(([x,y])=>{if(x>=0&&x<=GW0&&y>=0&&y<GH0)bvW[x][y]=true;});
  pstr(lvl.hW).forEach(([x,y])=>{if(x>=0&&x<GW0&&y>=0&&y<=GH0)bhW[x][y]=true;});
  const bPits={},bGoals={};
  pstr(lvl.pits).forEach(([x,y])=>bPits[x+','+y]=1);
  pstr(lvl.goals).forEach(([x,y])=>bGoals[x+','+y]=1);

  if(!portrait){
    vWalls=bvW;hWalls=bhW;pitsG=bPits;goalsG=bGoals;
    lvlMice=pstr(lvl.mice).map(([x,y,f])=>({x,y,dir:f||0}));
    lvlCats=pstr(lvl.cats).map(([x,y,f])=>({x,y,dir:f||0}));
  } else {
    // portrait grid: GW=9 cols, GH=12 rows
    // CCW rotation: (bx,by) → (by, GW0-1-bx) = (by, 11-bx)
    // new vWall at col x', row y' means vertical division between x' and x'+1 at row y'
    // A base vWall at col bx (between bx-1 and bx), row by
    // → in rotated space becomes hWall between rows (GW0-bx-1) and (GW0-bx) at col by
    // But let's rebuild cleanly:
    vWalls=Array.from({length:GW+1},()=>Array(GH).fill(false));
    hWalls=Array.from({length:GW},()=>Array(GH+1).fill(false));
    for(let y=0;y<GH;y++){vWalls[0][y]=vWalls[GW][y]=true;}
    for(let x=0;x<GW;x++){hWalls[x][0]=hWalls[x][GH]=true;}

    // Map base vWalls: vWall at [bx][by] = vertical segment at left of col bx, row by
    // CCW rot: point (bx,by) → (by, GW0-1-bx)
    // The vertical wall at col bx (between bx-1 and bx) maps to horizontal wall between rows (GW0-1-bx) and (GW0-bx)
    // at col by
    for(let bx=0;bx<=GW0;bx++){
      for(let by=0;by<GH0;by++){
        if(!bvW[bx][by])continue;
        const nx=by;          // rotated col
        const ny=GW0-bx;      // rotated row boundary (hWall index)
        if(nx>=0&&nx<GW&&ny>=0&&ny<=GH) hWalls[nx][ny]=true;
      }
    }
    // Map base hWalls: hWall at [bx][by] = horizontal segment at top of row by at col bx
    // maps to vertical wall at rotated col (by-1+1)=by at row (GW0-1-bx)  ... careful
    // In rotated space, row bx maps to rotated col = GW0-1-bx  (inverted)
    // Horizontal wall between rows by-1 and by → becomes vertical wall between cols by-1 and by at row GW0-1-bx
    // = vWall at col by at row (GW0-1-bx)
    for(let bx=0;bx<GW0;bx++){
      for(let by=0;by<=GH0;by++){
        if(!bhW[bx][by])continue;
        const nx=by;            // rotated col boundary
        const ny=GW0-1-bx;     // rotated row
        if(nx>=0&&nx<=GW&&ny>=0&&ny<GH) vWalls[nx][ny]=true;
      }
    }

    pitsG={};goalsG={};
    Object.keys(bPits).forEach(k=>{const[bx,by]=k.split(',').map(Number);const[nx,ny]=rotPt(bx,by);pitsG[nx+','+ny]=1;});
    Object.keys(bGoals).forEach(k=>{const[bx,by]=k.split(',').map(Number);const[nx,ny]=rotPt(bx,by);goalsG[nx+','+ny]=1;});

    lvlMice=pstr(lvl.mice).map(([bx,by,f])=>{const[nx,ny]=rotPt(bx,by);return{x:nx,y:ny,dir:rotDir(f||0)};});
    lvlCats=pstr(lvl.cats).map(([bx,by,f])=>{const[nx,ny]=rotPt(bx,by);return{x:nx,y:ny,dir:rotDir(f||0)};});
  }

  totMice=lvlMice.length;totCats=lvlCats.length;
  const a=lvl.arrows.split(' ').map(Number);
  alloc=rotAlloc([a[0]||0,a[1]||0,a[2]||0,a[3]||0]);
  Object.keys(entEmoji).forEach(k=>delete entEmoji[k]);
}

function resetLevel(){SFX.click();startLevel(curSet,curLvl);}

// ── CANVAS ─────────────────────────────────────────────────
// Track which placed arrow is being dragged (key = "x,y")
let dragPlacedKey=null;

function setupCanvas(){
  canvas=document.getElementById('gameCanvas');ctx=canvas.getContext('2d');
  canvas.addEventListener('click',onCvClick);
  canvas.addEventListener('touchend',onCvTouch,{passive:false});
  canvas.addEventListener('dragover',e=>e.preventDefault());
  canvas.addEventListener('drop',onCvDrop);
  // Drag placed arrows: mousedown sets draggable, dragstart fires the drag
  document.addEventListener('mousedown',onCvMouseDownDrag);
  canvas.addEventListener('dragstart',ev=>{
    if(!dragPlacedKey){ev.preventDefault();return;}
    const dir=placed[dragPlacedKey];
    ev.dataTransfer.setData('placedKey',dragPlacedKey);
    ev.dataTransfer.setData('arrowDir',String(dir));
    ev.dataTransfer.effectAllowed='move';
    const gh=document.getElementById('dragGhost');
    gh.textContent=ICONS[dir];gh.style.display='flex';
    ev.dataTransfer.setDragImage(gh,24,24);
    SFX.click();
  });
  canvas.addEventListener('dragend',()=>{
    document.getElementById('dragGhost').style.display='none';
    canvas.draggable=false;dragPlacedKey=null;
  });
}
function resizeCv(){
  if(!canvas)return;
  const area=document.querySelector('.game-area');
  const maxW=Math.floor((area.clientWidth-4)/GW);
  const maxH=Math.floor((area.clientHeight-4)/GH);
  cs=Math.min(maxW,maxH,80);cs=Math.max(cs,22);
  canvas.width=GW*cs;canvas.height=GH*cs;
}
function cellAt(cx,cy){
  const r=canvas.getBoundingClientRect();
  return{x:Math.floor((cx-r.left)/(r.width/GW)),y:Math.floor((cy-r.top)/(r.height/GH))};
}

function onCvClick(e){
  if(running)return;wakeAudio();
  canvas.draggable=false;
  const{x,y}=cellAt(e.clientX,e.clientY);
  if(x<0||x>=GW||y<0||y>=GH)return;
  doCell(x,y);
}
function onCvTouch(e){
  e.preventDefault();if(running)return;wakeAudio();
  const t=e.changedTouches[0];const{x,y}=cellAt(t.clientX,t.clientY);
  if(x<0||x>=GW||y<0||y>=GH)return;doCell(x,y);
}

// Drop from palette onto canvas — PLACE only on empty cell
// Drop from canvas onto canvas — MOVE placed arrow
function onCvDrop(e){
  e.preventDefault();if(running)return;
  const fromKey=e.dataTransfer.getData('placedKey');
  const dir=parseInt(e.dataTransfer.getData('arrowDir'));
  const{x,y}=cellAt(e.clientX,e.clientY);
  if(x<0||x>=GW||y<0||y>=GH){canvas.draggable=false;dragPlacedKey=null;return;}
  const destKey=x+','+y;

  if(fromKey){
    // Move placed arrow
    if(fromKey===destKey){canvas.draggable=false;dragPlacedKey=null;return;}
    const oldDir=placed[fromKey];
    delete placed[fromKey];
    if(placed[destKey]!==undefined)used[placed[destKey]]--;
    placed[destKey]=oldDir;
    buildPillsUI();draw(0);SFX.drop();
  } else if(!isNaN(dir)&&dir>=0&&dir<=3){
    // From palette — place only on empty
    if(placed[destKey]===undefined&&alloc[dir]-used[dir]>0){
      placed[destKey]=dir;used[dir]++;buildPillsUI();draw(0);SFX.drop();
    }
  }
  canvas.draggable=false;dragPlacedKey=null;
}

function onCvMouseDownDrag(e){
  if(running){canvas.draggable=false;dragPlacedKey=null;return;}
  const{x,y}=cellAt(e.clientX,e.clientY);
  if(x<0||x>=GW||y<0||y>=GH){canvas.draggable=false;dragPlacedKey=null;return;}
  const k=x+','+y;
  if(placed[k]!==undefined){canvas.draggable=true;dragPlacedKey=k;}
  else{canvas.draggable=false;dragPlacedKey=null;}
}

function doCell(x,y){
  const k=x+','+y;
  if(selTool===4){
    if(placed[k]!==undefined){used[placed[k]]--;delete placed[k];SFX.erase();}
    buildPillsUI();draw(0);return;
  }
  if(selTool>=0&&selTool<=3){
    // Click places/replaces
    if(placed[k]!==undefined){if(placed[k]===selTool){used[selTool]--;delete placed[k];SFX.erase();buildPillsUI();draw(0);return;}used[placed[k]]--;}
    if(alloc[selTool]-used[selTool]>0){placed[k]=selTool;used[selTool]++;SFX.place();}
    buildPillsUI();draw(0);return;
  }
  // No tool: tap existing arrow removes it
  if(placed[k]!==undefined){used[placed[k]]--;delete placed[k];SFX.erase();buildPillsUI();draw(0);}
}

// ── PALETTE ────────────────────────────────────────────────
const ICONS=['➡️','⬇️','⬅️','⬆️'];
function buildPillsUI(){
  const c=document.getElementById('palPills');c.innerHTML='';
  ICONS.forEach((icon,i)=>{
    const rem=alloc[i]-used[i];
    const el=document.createElement('div');
    el.className='apill'+(selTool===i?' sel':'')+(rem<=0?' mpty':'');
    el.setAttribute('draggable','true');
    el.innerHTML=`<div class="ai">${icon}</div><div class="ac">${rem}</div>`;
    el.onclick=()=>{
      if(running)return;wakeAudio();
      if(rem<=0&&selTool!==i)return;
      selTool=(selTool===i)?-1:i;buildPillsUI();SFX.click();
    };
    el.addEventListener('dragstart',ev=>{
      if(running||rem<=0){ev.preventDefault();return;}
      ev.dataTransfer.setData('arrowDir',String(i));ev.dataTransfer.effectAllowed='copy';
      const gh=document.getElementById('dragGhost');gh.textContent=icon;gh.style.display='flex';
      ev.dataTransfer.setDragImage(gh,24,24);SFX.click();
    });
    el.addEventListener('dragend',()=>{document.getElementById('dragGhost').style.display='none';});
    el.addEventListener('touchstart',()=>{if(!running&&rem>0){selTool=i;buildPillsUI();}},{passive:true});
    c.appendChild(el);
  });
  document.getElementById('erasePill').className='epill'+(selTool===4?' sel':'');
  const ep=document.getElementById('erasePill');
  ep.addEventListener('dragover',ev=>{ev.preventDefault();ep.classList.add('dragover');});
  ep.addEventListener('dragleave',()=>ep.classList.remove('dragover'));
  ep.addEventListener('drop',ev=>{
    ev.preventDefault();ep.classList.remove('dragover');
    const fromKey=ev.dataTransfer.getData('placedKey');
    if(fromKey&&placed[fromKey]!==undefined){
      used[placed[fromKey]]--;delete placed[fromKey];
      buildPillsUI();draw(0);SFX.erase();
    }
    canvas.draggable=false;dragPlacedKey=null;
  });
}
function selectErase(){if(running)return;selTool=(selTool===4)?-1:4;buildPillsUI();SFX.click();}

// ── DRAW ───────────────────────────────────────────────────
// Clean uniform checkerboard — warm cream tones, no patterns
const CA='#FDF8F0'; // light warm cream
const CB='#F5EFE4'; // slightly darker cream

function draw(t){
  if(!ctx||!pitsG||!goalsG||!vWalls||!hWalls)return;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let x=0;x<GW;x++){
    for(let y=0;y<GH;y++){
      const k=x+','+y,px=x*cs,py=y*cs;
      if(pitsG[k]){
        ctx.fillStyle='#2A0808';ctx.fillRect(px,py,cs,cs);
        const g=ctx.createRadialGradient(px+cs/2,py+cs/2,0,px+cs/2,py+cs/2,cs*.5);
        g.addColorStop(0,'rgba(180,20,40,.75)');g.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=g;ctx.fillRect(px,py,cs,cs);
        drawEmoji(px+cs/2,py+cs/2,'🕳️',cs*.5);
      } else if(goalsG[k]){
        ctx.fillStyle='#D0FFE8';ctx.fillRect(px,py,cs,cs);
        const g=ctx.createRadialGradient(px+cs/2,py+cs/2,0,px+cs/2,py+cs/2,cs*.55);
        g.addColorStop(0,'rgba(0,200,140,.48)');g.addColorStop(1,'rgba(0,200,140,0)');
        ctx.fillStyle=g;ctx.fillRect(px,py,cs,cs);
        ctx.strokeStyle='#00C897';ctx.lineWidth=2.5;ctx.strokeRect(px+2,py+2,cs-4,cs-4);
        drawEmoji(px+cs/2,py+cs/2,'🚀',cs*.54);
      } else {
        // Clean checkerboard — uniform, no textures
        ctx.fillStyle=((x+y)%2===0)?CA:CB;
        ctx.fillRect(px,py,cs,cs);
        ctx.strokeStyle='rgba(0,0,0,.045)';ctx.lineWidth=1;
        ctx.strokeRect(px+.5,py+.5,cs-1,cs-1);
      }
    }
  }

  // Arrows first (behind entities)
  for(const[k,d]of Object.entries(placed)){
    const[ax,ay]=k.split(',').map(Number);drawArrow(ax,ay,d);
  }
  drawAllWalls();

  // Entities — fully opaque white circle + emoji on top
  if(running){
    vMice.forEach(m=>drawEntity(lerp(m.px,m.x,t),lerp(m.py,m.y,t),gGood(m.id),m.dir));
    vCats.forEach(c=>drawEntity(lerp(c.px,c.x,t),lerp(c.py,c.y,t),gBad(c.id),c.dir));
  } else {
    lvlMice.forEach((m,i)=>drawEntity(m.x,m.y,gGood(i),m.dir));
    lvlCats.forEach((c,i)=>drawEntity(c.x,c.y,gBad(i+100),c.dir));
  }

  deathFX=deathFX.filter(fx=>{
    fx.t++;const p=fx.t/fx.maxT;if(p>=1)return false;
    ctx.save();ctx.globalAlpha=1-p;
    ctx.font=`${cs*(0.46+p*.38)}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(fx.emoji,fx.x*cs+cs/2,fx.y*cs+cs/2-p*cs*1.4);ctx.restore();
    return true;
  });
}

function lerp(a,b,t){return a+(b-a)*t;}
function drawEmoji(cx,cy,em,sz){ctx.font=`${sz}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(em,cx,cy);}

function drawEntity(gx,gy,em,dir){
  const px=gx*cs+cs/2,py=gy*cs+cs/2,sz=cs*.7;
  ctx.save();ctx.translate(px,py);ctx.rotate(dir*Math.PI/2);
  // Opaque white disc — no transparency bleed
  ctx.fillStyle='#FFFFFF';
  ctx.beginPath();ctx.arc(0,0,sz*.43,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.06)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(0,0,sz*.43,0,Math.PI*2);ctx.stroke();
  ctx.font=`${sz}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(em,0,1);
  ctx.restore();
}

function drawArrow(gx,gy,dir){
  const px=gx*cs,py=gy*cs,cx=px+cs/2,cy=py+cs/2;
  ctx.fillStyle='rgba(58,134,255,.18)';rrect(ctx,px+3,py+3,cs-6,cs-6,9);ctx.fill();
  ctx.strokeStyle='rgba(58,134,255,.4)';ctx.lineWidth=1.5;rrect(ctx,px+3,py+3,cs-6,cs-6,9);ctx.stroke();
  ctx.save();ctx.translate(cx,cy);ctx.rotate(dir*Math.PI/2);
  const r=cs*.27;ctx.fillStyle='#3A86FF';ctx.strokeStyle='#1A56BB';ctx.lineWidth=2;ctx.lineJoin='round';
  ctx.beginPath();ctx.moveTo(r,0);ctx.lineTo(r*.1,-r*.55);ctx.lineTo(r*.1,-r*.26);
  ctx.lineTo(-r*.62,-r*.26);ctx.lineTo(-r*.62,r*.26);ctx.lineTo(r*.1,r*.26);ctx.lineTo(r*.1,r*.55);
  ctx.closePath();ctx.fill();ctx.stroke();ctx.restore();
}

function drawAllWalls(){
  const tk=Math.max(4,Math.floor(cs*.1));
  for(let x=0;x<=GW;x++)for(let y=0;y<GH;y++){if(vWalls[x]&&vWalls[x][y])wSeg(x*cs-tk/2,y*cs,tk,cs,(x===0||x===GW));}
  for(let x=0;x<GW;x++)for(let y=0;y<=GH;y++){if(hWalls[x]&&hWalls[x][y])wSeg(x*cs,y*cs-tk/2,cs,tk,(y===0||y===GH));}
}
function wSeg(x,y,w,h,brd){
  ctx.save();if(!brd){ctx.shadowColor='#FF6EC7';ctx.shadowBlur=6;}
  ctx.fillStyle=brd?'#B08060':'#FF6EC7';ctx.fillRect(x,y,w,h);
  if(!brd){ctx.fillStyle='#FFE0F0';ctx.fillRect(x,y,w,Math.min(2,h));ctx.fillRect(x,y,Math.min(2,w),h);}
  ctx.restore();
}
function rrect(c,x,y,w,h,r){
  c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();
}

// ── SIM ────────────────────────────────────────────────────
function toggleSpeed(){if(speedMult===1)speedMult=2;else if(speedMult===2)speedMult=4;else speedMult=1;document.getElementById('speedBtn').textContent=`⚡x${speedMult}`;}
function startSim(){
  if(running)return;wakeAudio();SFX.go();
  running=true;pausing=false;saved=0;eaten=0;deathFX=[];tickCount=0;stopIdleShake();
  let eid=0;
  lMice=lvlMice.map(m=>({...m,id:eid++}));lCats=lvlCats.map(c=>({...c,id:eid++}));
  totMice=lMice.length;totCats=lCats.length;
  vMice=lMice.map(m=>({...m,px:m.x,py:m.y}));vCats=lCats.map(c=>({...c,px:c.x,py:c.y}));
  document.getElementById('goBtn').style.display='none';
  document.getElementById('stopBtn').style.display='block';
  document.getElementById('speedBtn').style.display='block';
  updateScore();lastTick=performance.now();rafId=requestAnimationFrame(loop);
}
function stopSim(){
  running=false;pausing=false;
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  if(pauseTmr){clearTimeout(pauseTmr);pauseTmr=null;}
  document.getElementById('goBtn').style.display='block';
  document.getElementById('stopBtn').style.display='none';
  document.getElementById('speedBtn').style.display='none';
  draw(0);
  if(document.getElementById('screen-game').classList.contains('active'))startIdleShake();
}
function loop(now){
  if(!running)return;
  if(!pausing){const el=now-lastTick,tk=curTick();if(el>=tk){lastTick=now;tick();}else draw(Math.min(el/tk,1));}
  else draw(1);
  rafId=requestAnimationFrame(loop);
}
function canGo(x,y,dir){
  if(dir===0)return!(vWalls[x+1]&&vWalls[x+1][y]);
  if(dir===1)return!(hWalls[x]&&hWalls[x][y+1]);
  if(dir===2)return!(vWalls[x]&&vWalls[x][y]);
  if(dir===3)return!(hWalls[x]&&hWalls[x][y]);
  return true;
}
function moveEnt(e){
  if(canGo(e.x,e.y,e.dir)){e.x+=DX[e.dir];e.y+=DY[e.dir];}
  else{for(const t of[1,-1,2]){const nd=((e.dir+t)+4)%4;if(canGo(e.x,e.y,nd)){e.dir=nd;e.x+=DX[nd];e.y+=DY[nd];return;}}e.dir=(e.dir+2)%4;}
}
function applyArrow(e){const k=e.x+','+e.y;if(placed[k]!==undefined)e.dir=placed[k];}
function flash(type){const el=document.getElementById(type==='r'?'fR':'fG');el.classList.add('show');setTimeout(()=>el.classList.remove('show'),160);}

function tick(){
  tickCount++;
  if(tickCount%5===0){lMice.forEach(m=>shGood(m.id));lCats.forEach(c=>shBad(c.id));}
  vMice.forEach(v=>{v.px=v.x;v.py=v.y;});vCats.forEach(v=>{v.px=v.x;v.py=v.y;});
  let anyDeath=false;

  const sm=[];
  for(const m of lMice){
    applyArrow(m);moveEnt(m);const k=m.x+','+m.y;
    if(m.x<0||m.x>=GW||m.y<0||m.y>=GH){saved++;flash('g');SFX.save();rmV(vMice,m.id);}
    else if(pitsG[k]){eaten++;deathFX.push({x:m.x,y:m.y,t:0,maxT:20,emoji:'💥'});flash('r');SFX.die();anyDeath=true;rmV(vMice,m.id);}
    else if(goalsG[k]){saved++;flash('g');SFX.save();deathFX.push({x:m.x,y:m.y,t:0,maxT:14,emoji:'⭐'});rmV(vMice,m.id);}
    else{updV(vMice,m);sm.push(m);}
  }
  lMice=sm;

  const sc=[];
  for(const c of lCats){
    applyArrow(c);moveEnt(c);const k=c.x+','+c.y;
    if(c.x<0||c.x>=GW||c.y<0||c.y>=GH){rmV(vCats,c.id);}
    else if(pitsG[k]){deathFX.push({x:c.x,y:c.y,t:0,maxT:20,emoji:'💥'});anyDeath=true;rmV(vCats,c.id);}
    else if(goalsG[k]){rmV(vCats,c.id);}
    else{updV(vCats,c);sc.push(c);}
  }
  lCats=sc;

  const sm2=[];
  for(const m of lMice){
    if(lCats.some(c=>c.x===m.x&&c.y===m.y)){eaten++;deathFX.push({x:m.x,y:m.y,t:0,maxT:24,emoji:'😱'});flash('r');SFX.die();anyDeath=true;rmV(vMice,m.id);}
    else sm2.push(m);
  }
  lMice=sm2;

  updateScore();draw(0);
  if(anyDeath){
    const pm=Math.max(80,Math.floor(450/speedMult));pausing=true;
    if(pauseTmr)clearTimeout(pauseTmr);
    pauseTmr=setTimeout(()=>{pausing=false;lastTick=performance.now();if(lMice.length===0)endGame();},pm);
  } else if(lMice.length===0) setTimeout(()=>endGame(),80);
}
function rmV(arr,id){const i=arr.findIndex(v=>v.id===id);if(i>=0)arr.splice(i,1);}
function updV(arr,e){const v=arr.find(v=>v.id===e.id);if(v){v.x=e.x;v.y=e.y;v.dir=e.dir;}}
function endGame(){setTimeout(()=>{stopSim();if(saved>0){SFX.win();showWin();}else{SFX.lose();showLose();}},350);}
function updateScore(){
  document.getElementById('sc-mice').textContent=running?lMice.length:totMice;
  document.getElementById('sc-saved').textContent=saved;
  document.getElementById('sc-eaten').textContent=eaten;
  document.getElementById('sc-cats').textContent=running?lCats.length:totCats;
}
function showWin(){
  SAVE(curSet,curLvl);
  const pct=totMice>0?saved/totMice:1;
  document.getElementById('winStars').textContent=pct>=1?'⭐⭐⭐':pct>=.67?'⭐⭐':'⭐';
  document.getElementById('winMsg').textContent=LANGS[lang].winMsg(saved,totMice,eaten);
  document.getElementById('winOv').classList.add('show');
}
function showLose(){document.getElementById('loseMsg').textContent=LANGS[lang].loseMsg(eaten);document.getElementById('loseOv').classList.add('show');}
function retryLevel(){hideOvs();SFX.click();startLevel(curSet,curLvl);}
function nextLevel(){
  hideOvs();SFX.click();
  if(curLvl+1<SETS[curSet].levels.length)startLevel(curSet,curLvl+1);
  else if(curSet+1<SETS.length)startLevel(curSet+1,0);
  else showLevels();
}

// ── RESIZE / ORIENTATION ───────────────────────────────────
let lastOri=null;
function handleResize(){
  detectOri();
  const nowOri=portrait;
  if(lastOri!==null&&lastOri!==nowOri&&document.getElementById('screen-game').classList.contains('active')){
    lastOri=nowOri;
    startLevel(curSet,curLvl); // reload with new orientation
    return;
  }
  lastOri=nowOri;
  resizeCv();draw(0);
}
window.addEventListener('resize',handleResize);
window.addEventListener('orientationchange',()=>setTimeout(handleResize,250));

// ── INIT ───────────────────────────────────────────────────
window.addEventListener('load',()=>{
  detectOri();lastOri=portrait;
  setupCanvas();
  setLang('es');
  document.querySelector('.langbtn').classList.add('on');
  showSc('screen-title');
});
</script>
</body>
</html>
