<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>LAZR — Laser Puzzle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #080c12;
  --surface: #0d1520;
  --surface2: #111d2e;
  --border: #1a2d44;
  --accent: #00e5ff;
  --accent2: #ff3366;
  --accent3: #7c3aed;
  --text: #e2e8f0;
  --text-muted: #64748b;
  --laser: #ff2200;
  --gold: #fbbf24;
  --success: #10b981;
  --header-h: 56px;
  --panel-w: 260px;
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
}

html, body {
  height: 100%; width: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
}

/* ===== SCREENS ===== */
.screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: opacity 0.5s var(--ease), transform 0.5s var(--ease);
  z-index: 10;
}
.screen.hidden {
  opacity: 0; pointer-events: none; transform: scale(0.97);
}

/* ===== STAR BG ===== */
.stars {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  overflow: hidden;
}
.star {
  position: absolute; border-radius: 50%;
  background: #fff;
  animation: twinkle var(--dur, 3s) ease-in-out infinite;
  animation-delay: var(--delay, 0s);
}
@keyframes twinkle {
  0%, 100% { opacity: var(--min-op, 0.1); }
  50% { opacity: var(--max-op, 0.6); }
}

/* ===== GRID BG PATTERN ===== */
.grid-bg {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* ===== MENU SCREEN ===== */
#screen-menu {
  gap: 32px;
}
.logo {
  text-align: center;
  position: relative;
  z-index: 1;
}
.logo-title {
  font-family: 'Orbitron', monospace;
  font-size: clamp(48px, 12vw, 96px);
  font-weight: 900;
  letter-spacing: 0.2em;
  color: var(--accent);
  text-shadow: 0 0 40px rgba(0,229,255,0.5), 0 0 80px rgba(0,229,255,0.2);
  animation: pulse-glow 3s ease-in-out infinite;
  line-height: 1;
}
.logo-sub {
  font-family: 'Orbitron', monospace;
  font-size: clamp(10px, 2vw, 14px);
  letter-spacing: 0.4em;
  color: var(--text-muted);
  margin-top: 8px;
  text-transform: uppercase;
}
@keyframes pulse-glow {
  0%, 100% { text-shadow: 0 0 40px rgba(0,229,255,0.5), 0 0 80px rgba(0,229,255,0.2); }
  50% { text-shadow: 0 0 60px rgba(0,229,255,0.8), 0 0 120px rgba(0,229,255,0.4); }
}

.menu-laser-preview {
  width: min(320px, 80vw);
  height: 180px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--surface);
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 40px rgba(0,229,255,0.05), inset 0 0 40px rgba(0,0,0,0.4);
}
.menu-laser-preview canvas {
  width: 100%; height: 100%;
}

.menu-buttons {
  display: flex; flex-direction: column; gap: 12px; align-items: center; width: 100%;
  max-width: 280px; z-index: 1;
}
.btn {
  width: 100%; padding: 14px 24px;
  border: none; border-radius: 8px; cursor: pointer;
  font-family: 'Orbitron', monospace; font-size: 13px; font-weight: 700;
  letter-spacing: 0.15em; text-transform: uppercase;
  transition: all 0.2s var(--ease);
  position: relative; overflow: hidden;
}
.btn::after {
  content: ''; position: absolute; inset: 0;
  background: rgba(255,255,255,0.1);
  opacity: 0; transition: opacity 0.2s;
}
.btn:hover::after { opacity: 1; }
.btn:active { transform: scale(0.97); }

.btn-primary {
  background: var(--accent);
  color: var(--bg);
  box-shadow: 0 0 20px rgba(0,229,255,0.3), 0 4px 12px rgba(0,0,0,0.3);
}
.btn-primary:hover {
  box-shadow: 0 0 30px rgba(0,229,255,0.5), 0 4px 16px rgba(0,0,0,0.4);
}
.btn-secondary {
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
.btn-danger {
  background: transparent;
  color: var(--accent2);
  border: 1px solid rgba(255,51,102,0.3);
}
.btn-danger:hover { border-color: var(--accent2); background: rgba(255,51,102,0.1); }

/* ===== LEVEL SELECT ===== */
#screen-levels {
  justify-content: flex-start;
  overflow-y: auto;
  padding: 24px 16px;
  align-items: stretch;
  gap: 0;
}
.levels-header {
  display: flex; align-items: center; gap: 16px;
  padding: 0 0 24px;
  position: sticky; top: 0;
  background: linear-gradient(var(--bg) 80%, transparent);
  z-index: 5;
  padding-top: 8px;
}
.levels-header h1 {
  font-family: 'Orbitron', monospace; font-size: 20px; font-weight: 700;
  color: var(--accent); letter-spacing: 0.1em;
}
.back-btn {
  width: 36px; height: 36px; border-radius: 8px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); cursor: pointer; font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; flex-shrink: 0;
}
.back-btn:hover { border-color: var(--accent); color: var(--accent); }

.level-groups { width: 100%; max-width: 600px; margin: 0 auto; }
.level-group { margin-bottom: 24px; }
.level-group-header {
  display: flex; align-items: baseline; gap: 10px;
  margin-bottom: 12px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.level-group-name {
  font-family: 'Orbitron', monospace; font-size: 15px; font-weight: 700;
  color: var(--text);
}
.level-group-diff {
  font-size: 11px; color: var(--text-muted); letter-spacing: 0.05em;
}
.level-group-progress {
  margin-left: auto; font-size: 11px;
  color: var(--text-muted); font-variant-numeric: tabular-nums;
}

.level-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); gap: 8px;
}
.level-btn {
  aspect-ratio: 1; border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-muted);
  font-family: 'Orbitron', monospace; font-size: 13px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s var(--ease);
  position: relative;
}
.level-btn.unlocked {
  color: var(--text); border-color: var(--border);
}
.level-btn.unlocked:hover {
  border-color: var(--accent); color: var(--accent);
  background: rgba(0,229,255,0.05);
  box-shadow: 0 0 16px rgba(0,229,255,0.15);
  transform: scale(1.05);
}
.level-btn.completed {
  border-color: var(--success); color: var(--success);
  background: rgba(16,185,129,0.08);
}
.level-btn.completed::after {
  content: '✓'; position: absolute; top: 2px; right: 4px;
  font-size: 8px; color: var(--success);
}
.level-btn.locked {
  opacity: 0.3; cursor: default; pointer-events: none;
}
.level-btn.current {
  border-color: var(--accent); color: var(--accent);
  background: rgba(0,229,255,0.1);
  box-shadow: 0 0 16px rgba(0,229,255,0.2);
}

/* ===== GAME SCREEN ===== */
#screen-game {
  justify-content: flex-start;
  padding: 0;
}

/* ===== HEADER ===== */
.game-header {
  width: 100%; height: var(--header-h);
  background: rgba(8,12,18,0.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 12px; gap: 8px;
  position: relative; z-index: 20; flex-shrink: 0;
}
.header-btn {
  height: 36px; padding: 0 12px;
  border-radius: 6px; background: transparent;
  border: 1px solid var(--border); color: var(--text-muted);
  cursor: pointer; font-size: 12px; font-family: 'Inter', sans-serif;
  display: flex; align-items: center; gap: 6px;
  transition: all 0.2s; white-space: nowrap;
}
.header-btn:hover { border-color: var(--accent); color: var(--accent); }
.header-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

.header-level {
  flex: 1; text-align: center;
}
.header-level-name {
  font-family: 'Orbitron', monospace; font-size: 13px; font-weight: 700;
  color: var(--text); letter-spacing: 0.05em;
}
.header-level-sub {
  font-size: 10px; color: var(--text-muted); margin-top: 1px;
}

.header-nav {
  display: flex; gap: 4px;
}
.nav-arrow {
  width: 32px; height: 32px; border-radius: 6px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text-muted); cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.nav-arrow:hover { border-color: var(--accent); color: var(--accent); }

/* ===== CANVAS AREA ===== */
.game-area {
  flex: 1; width: 100%;
  position: relative; overflow: hidden;
}
#game-main {
  position: absolute; top: 0; left: 0;
}
.game-canvas-layer {
  position: absolute; top: 0; left: 0; pointer-events: none;
}

/* ===== OVERLAY PANELS ===== */
.overlay-panel {
  position: fixed; z-index: 100;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  padding: 20px;
  min-width: 220px;
  display: none;
  animation: panel-in 0.2s var(--ease);
}
.overlay-panel.show { display: block; }
@keyframes panel-in {
  from { opacity: 0; transform: translateY(-8px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.overlay-panel h3 {
  font-family: 'Orbitron', monospace; font-size: 12px; font-weight: 700;
  letter-spacing: 0.15em; color: var(--accent);
  text-transform: uppercase; margin-bottom: 16px;
}
.setting-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 0; border-bottom: 1px solid var(--border); gap: 12px;
}
.setting-row:last-child { border-bottom: none; }
.setting-row label {
  font-size: 13px; color: var(--text); cursor: pointer;
}
/* Toggle switch */
.toggle {
  position: relative; width: 40px; height: 22px; flex-shrink: 0;
}
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute; inset: 0; border-radius: 22px;
  background: var(--surface2); border: 1px solid var(--border);
  cursor: pointer; transition: 0.2s;
}
.toggle-slider::before {
  content: ''; position: absolute;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--text-muted);
  top: 2px; left: 2px;
  transition: 0.2s;
}
.toggle input:checked + .toggle-slider { background: rgba(0,229,255,0.2); border-color: var(--accent); }
.toggle input:checked + .toggle-slider::before { transform: translateX(18px); background: var(--accent); }

.solution-link {
  display: block; padding: 8px 0; color: var(--accent);
  font-size: 13px; cursor: pointer; text-decoration: none;
  transition: opacity 0.2s;
}
.solution-link:hover { opacity: 0.7; }

.settings-divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
.settings-info { font-size: 11px; color: var(--text-muted); line-height: 1.6; }

/* ===== VICTORY SCREEN ===== */
#victory-overlay {
  position: fixed; inset: 0; z-index: 50;
  display: flex; align-items: center; justify-content: center;
  background: rgba(8,12,18,0.8); backdrop-filter: blur(8px);
  opacity: 0; pointer-events: none;
  transition: opacity 0.4s var(--ease);
}
#victory-overlay.show {
  opacity: 1; pointer-events: auto;
}
.victory-card {
  background: var(--surface);
  border: 1px solid var(--accent);
  border-radius: 20px;
  padding: 40px 48px;
  text-align: center;
  box-shadow: 0 0 60px rgba(0,229,255,0.2), 0 20px 60px rgba(0,0,0,0.5);
  animation: victory-pop 0.5s var(--ease);
}
@keyframes victory-pop {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.victory-icon {
  font-size: 56px; line-height: 1; margin-bottom: 16px;
  animation: spin-once 0.6s var(--ease);
}
@keyframes spin-once {
  from { transform: rotate(-180deg) scale(0); }
  to { transform: rotate(0) scale(1); }
}
.victory-title {
  font-family: 'Orbitron', monospace; font-size: 28px; font-weight: 900;
  color: var(--accent); letter-spacing: 0.1em;
  text-shadow: 0 0 30px rgba(0,229,255,0.5);
  margin-bottom: 8px;
}
.victory-sub { color: var(--text-muted); margin-bottom: 28px; font-size: 14px; }
.victory-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
.victory-btn {
  padding: 12px 24px; border-radius: 8px; cursor: pointer;
  font-family: 'Orbitron', monospace; font-size: 12px; font-weight: 700;
  letter-spacing: 0.1em; border: none; transition: all 0.2s;
}
.victory-btn-next { background: var(--accent); color: var(--bg); }
.victory-btn-next:hover { box-shadow: 0 0 20px rgba(0,229,255,0.4); }
.victory-btn-menu { background: transparent; color: var(--text); border: 1px solid var(--border); }
.victory-btn-menu:hover { border-color: var(--text); }

/* ===== LANG SWITCHER ===== */
.lang-row {
  display: flex; gap: 6px; flex-wrap: wrap;
}
.lang-btn {
  padding: 4px 10px; border-radius: 4px; font-size: 11px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text-muted); cursor: pointer; transition: all 0.2s;
  font-family: 'Inter', sans-serif;
}
.lang-btn.active, .lang-btn:hover {
  border-color: var(--accent); color: var(--accent);
  background: rgba(0,229,255,0.05);
}

/* ===== PROGRESS BAR ===== */
.progress-bar {
  height: 3px; background: var(--border); border-radius: 2px;
  overflow: hidden; margin-top: 6px;
}
.progress-fill {
  height: 100%; background: var(--accent);
  border-radius: 2px; transition: width 0.5s var(--ease);
  box-shadow: 0 0 8px var(--accent);
}

/* ===== DIFF BADGE ===== */
.diff-badge {
  display: inline-block; padding: 2px 8px; border-radius: 4px;
  font-size: 10px; letter-spacing: 0.05em; font-weight: 500;
}
.diff-easy { background: rgba(16,185,129,0.15); color: #10b981; border: 1px solid rgba(16,185,129,0.3); }
.diff-medium { background: rgba(251,191,36,0.15); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
.diff-hard { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }

/* ===== TOOLTIP LEGEND ===== */
.legend {
  display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px;
}
.legend-item {
  display: flex; align-items: center; gap: 6px; font-size: 11px;
  color: var(--text-muted);
}
.legend-dot {
  width: 10px; height: 10px; border-radius: 2px;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 480px) {
  :root { --header-h: 50px; }
  .header-btn span { display: none; }
  .victory-card { padding: 28px 24px; }
  .victory-title { font-size: 22px; }
}


/* ===== ENHANCED GAME ANIMATIONS ===== */

/* Canvas layer for game gets a subtle glow border when solving */
.game-area {
  position: relative;
}
.game-area::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 0;
  pointer-events: none;
  box-shadow: inset 0 0 60px rgba(0,0,0,0.6);
  z-index: 1;
}

/* Level transition label pulse */
@keyframes level-label-glow {
  0%, 100% { text-shadow: 0 0 30px rgba(0,229,255,0.8), 0 0 60px rgba(0,229,255,0.4); }
  50% { text-shadow: 0 0 50px rgba(0,229,255,1), 0 0 100px rgba(0,229,255,0.6); }
}

/* Victory card sparkle */
.victory-card {
  animation: victory-pop 0.5s cubic-bezier(0.16,1,0.3,1), victory-glow 2s ease-in-out 0.5s infinite;
}
@keyframes victory-glow {
  0%, 100% { box-shadow: 0 0 60px rgba(0,229,255,0.2), 0 20px 60px rgba(0,0,0,0.5); }
  50% { box-shadow: 0 0 80px rgba(0,229,255,0.4), 0 20px 80px rgba(0,0,0,0.6); }
}

/* Victory icon bounce */
.victory-icon {
  animation: spin-once 0.6s cubic-bezier(0.16,1,0.3,1), icon-bounce 1.5s ease-in-out 1s infinite;
}
@keyframes icon-bounce {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-8px) scale(1.1); }
}

/* Header level name flash on change */
@keyframes flash-in {
  from { opacity: 0; transform: translateY(-4px); }
  to { opacity: 1; transform: translateY(0); }
}
.flash-anim {
  animation: flash-in 0.3s cubic-bezier(0.16,1,0.3,1);
}

/* Logo scanline effect on menu */
.logo-title {
  position: relative;
}
.logo-title::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, rgba(0,229,255,0.6), transparent);
  animation: logo-scan 3s ease-in-out infinite;
  top: 0;
}
@keyframes logo-scan {
  0% { top: 0; opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { top: 100%; opacity: 0; }
}

/* Level button hover pulse */
.level-btn.unlocked:hover {
  animation: level-btn-pulse 0.6s ease-in-out;
}
@keyframes level-btn-pulse {
  0% { box-shadow: 0 0 0 rgba(0,229,255,0); }
  50% { box-shadow: 0 0 20px rgba(0,229,255,0.4); }
  100% { box-shadow: 0 0 16px rgba(0,229,255,0.15); }
}

/* Ripple animation fix */
@keyframes cell-ripple {
  from { width:10px;height:10px;margin-left:0;margin-top:0;opacity:1; border-color: rgba(0,229,255,0.9); }
  to { width:90px;height:90px;margin-left:-40px;margin-top:-40px;opacity:0; border-color: rgba(0,229,255,0); }
}

/* Canvas cursor */
#game-main { cursor: grab; }
#game-main:active { cursor: grabbing; }

/* Game area vignette */
#screen-game {
  background: radial-gradient(ellipse at 50% 50%, rgba(0,10,30,0.3) 0%, rgba(0,0,0,0.8) 100%);
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ===== LASER LINE GLOW ===== */
canvas { image-rendering: crisp-edges; }

/* ===== SCAN LINE EFFECT ===== */
#screen-menu::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,229,255,0.01) 2px, rgba(0,229,255,0.01) 4px);
  z-index: 0;
}
</style>
</head>
<body>

<!-- BACKGROUND -->
<div class="grid-bg"></div>
<div class="stars" id="stars"></div>

<!-- ===== MENU SCREEN ===== -->
<div class="screen" id="screen-menu">
  <div class="logo">
    <div class="logo-title">LAZR</div>
    <div class="logo-sub">Laser Puzzle Game</div>
  </div>
  <canvas id="menu-preview" width="320" height="180" style="width:min(320px,80vw);height:min(180px,45vw);border:1px solid var(--border);border-radius:12px;background:var(--surface);box-shadow:0 0 40px rgba(0,229,255,0.05);position:relative;z-index:1;"></canvas>
  <div class="menu-buttons">
    <button class="btn btn-primary" onclick="showLevelSelect()" id="btn-play">▶ PLAY</button>
    <button class="btn btn-secondary" onclick="showSettings()">⚙ SETTINGS</button>
  </div>
  <div style="position:relative;z-index:1;text-align:center;color:var(--text-muted);font-size:11px;margin-top:8px;" id="menu-progress-label"></div>
</div>

<!-- ===== LEVEL SELECT ===== -->
<div class="screen hidden" id="screen-levels">
  <div style="width:100%;max-width:600px;margin:0 auto;">
    <div class="levels-header">
      <button class="back-btn" onclick="showMenu()">←</button>
      <h1 id="levels-title">SELECT LEVEL</h1>
    </div>
    <div class="level-groups" id="level-groups"></div>
  </div>
</div>

<!-- ===== GAME SCREEN ===== -->
<div class="screen hidden" id="screen-game">
  <div class="game-header">
    <button class="header-btn" onclick="showMenu()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
      <span id="i18n-menu">Menu</span>
    </button>
    <button class="header-btn" onclick="showLevelSelect()">

// Polyfill for CanvasRenderingContext2D.roundRect
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (w < 2*r) r = w/2;
    if (h < 2*r) r = h/2;
    this.beginPath();
    this.moveTo(x+r, y);
    this.arcTo(x+w, y, x+w, y+h, r);
    this.arcTo(x+w, y+h, x, y+h, r);
    this.arcTo(x, y+h, x, y, r);
    this.arcTo(x, y, x+w, y, r);
    this.closePath();
    return this;
  };
}

<script>
// ===== GAME ENGINE =====
/**
 * Cell types
 * == empty:
 * cell that is empty with the possibility to move a block in, the laser goes through it with no changes;
 * == none:
 * cell with no possibility to move a block in, the laser goes through it with no changes;
 * == mirror:
 * cell that reflects the laser with a 90deg angle;
 * == blackhole:
 * cell that absorbs the laser and doesn't let it go through nor reflects it;
 * == glass:
 * cell that both let the laser go through and reflects it with a 90deg angle;
 * == prism:
 * the laser is translated to the opposite side of the entrance and it goes out with the same direction it came in;
 * == mirror_stuck:
 * same as mirror, but without the possibility to move the cell;
 * == blackhole_stuck:
 * same as blackhole, but without the possibility to move the cell.
 * == glass_stuck:
 * same as glass, but without the possibility to move the cell.
 */



var LaserGame = function() {
	var canvas = document.getElementById(GAME_OPTS.canvasId);
	if (!canvas.getContext) {
		return false;
	}

	var _opt;

	var _docWidth = LAYOUT.maxWidth,
		_docHeight = LAYOUT.maxHeight,
		_canvasW,
		_canvasH,
		_canvasD, // measure of the diagonal of the canvas
		_cellW,
		_cellH,
		_startX, // x coordinate of where the actual grid starts
		_startY, // y coordinate of where the actual grid starts
		_endX, // x coordinate of where the actual grid ends
		_endY; // y coordinate of where the actual grid ends

	var _ctx = canvas.getContext('2d'),
		_cellW_2,
		_cellH_2,
		_cellR,
		_cells,
		_cellsLength,
		_movingCell,
		_points,
		_lasersCounter,
		_targetRadius,
		_starterRadius,
		_screwRadius,
		_screwDistance,
		_targets,
		_victory;

	/**
	 * Layers:
	 * bg - empty and none cells, targets
	 * debug - grids and cell numbers
	 * cells - all the other cells
	 * laser
	 * moving - where the moving cell is drawn
	 * touch - captures events and coordinates - it's the main canvas
	 */
	var _layers = ['bg', 'debug', 'cells', 'laser', 'moving'],
		_canvases,
		_ctxs,
		_canvasParent = canvas.parentNode;

	if (DEBUG === false) {
		_layers.splice(1, 1);
	}


	/**
	 * Initiate the game
	 */
	this.init = function(opt) {
		_opt = opt;
		initCanvas();
		calcCells();
		initCells();
		initTargets();
		initVictory();
		drawStuff();
		initLasers();
		checkVictory();
		canvas.on('mousedown', click);
		canvas.on('touchstart', click);
		// console.log(_cells);
	};


	/**
	 * Show solution
	 */
	this.solution = function() {
		var n = _opt.solution,
			len = n.length;
		// reset cells if not none
		for (var i = 1; i <= _cellsLength; i++) {
			if (_cells[i].type !== 'none') {
				_cells[i].type = 'empty';
			}
		}
		// load solution
		for (var i = 0; i < len; i++) {
			for (var l = 0; l < n[i].arr.length; l++) {
				_cells[ n[i].arr[l] ].type = n[i].type;
			}
		}
		// reset canvas cells
		_ctxs['cells'].clearRect(0, 0, _canvasW, _canvasH);
		// draw normal cells
		drawLayerCells(n);
		// redraw lasers
		initLasers();
	};


	/**
	 * Redraw the current arrangement with the new size
	 * @param {number} w - Width of the canvas
	 * @param {number} h - Height of the canvas
	 */
	this.reload = function(w, h) {
		_docWidth = w;
		_docHeight = h;

		calcSizes();

		canvas.setAttribute('height', _canvasH);
		canvas.setAttribute('width', _canvasW);

		for (var i = 0; i < _layers.length; i++) {
			var li = _layers[i];
			_canvases[li].setAttribute('height', _canvasH);
			_canvases[li].setAttribute('width', _canvasW);
			_ctxs[li].clearRect(0, 0, _canvasW, _canvasH);
		}

		// calcCells();
		var x, y,
			gy = _startY,
			counter = 1;
		for (var r = 0; r < _opt.rows; r++) {
			x = _startX;
			y = gy;
			gy += _cellH;
			for (var c = 0; c < _opt.columns; c++) {
				_cells[counter].x = x;
				_cells[counter].y = y;
				x += _cellW;
				counter++;
			}
		}

		// initCells();
		// not needed

		initTargets();
		initVictory();
		drawStuff(true);
		initLasers();
		checkVictory();
	};


	/**
	 * Prepare the canvas elements
	 */
	var initCanvas = function() {
		calcSizes();
		
		canvas.setAttribute('height', _canvasH);
		canvas.setAttribute('width', _canvasW);

		_cells = [{}]; // first item empty
		_cellsLength = _opt.rows * _opt.columns;
		_movingCell = null;

		_canvases = [];
		_ctxs = [];

		// Remove canvas elements if they already exist
		if (document.getElementsByTagName('canvas').length > 1) {
			for (var i = 0; i < _layers.length; i++) {
				var t = document.getElementsByClassName(GAME_OPTS.canvasClass + _layers[i]);
				if (t.length > 0) {
					t[0].parentNode.removeChild(t[0]);
				}
			}
		}

		for (var i = 0; i < _layers.length; i++) {
			var li = _layers[i];
			_canvases[li] = document.createElement('canvas');
			_canvasParent.appendChild(_canvases[li]);
			_canvases[li].className = GAME_OPTS.canvasClass + li;
			_canvases[li].setAttribute('height', _canvasH);
			_canvases[li].setAttribute('width', _canvasW);
			_ctxs[li] = _canvases[li].getContext('2d');
		}
	};


	/**
	 * Calculate sizes of the elements
	 */
	var calcSizes = function() {
		_canvasW = _docHeight * (_opt.columns + LAYOUT.padding) / (_opt.rows + LAYOUT.padding);

		if (_canvasW > _docWidth) {
			_canvasW = _docWidth;
		}

		_cellW = Math.floor(_canvasW / (_opt.columns + LAYOUT.padding));

		if (isEven(_cellW)) {
			_cellW = _cellW - 1;
		}

		_cellH = _cellW;
		_canvasW = _docWidth;
		_canvasH = _docHeight;
		_startX = Math.floor((_canvasW - (_cellW * _opt.columns)) / 2);
		_startY = Math.floor((_canvasH - (_cellH * _opt.rows)) / 2);
		_endX = _cellW * _opt.columns + _startX;
		_endY = _cellH * _opt.rows + _startY;
		_canvasD = Math.sqrt(Math.pow(_canvasW, 2) + Math.pow(_canvasH, 2));

		_cellW_2 = _cellW / 2;
		_cellH_2 = _cellH / 2;
		_cellR = _cellW / 4; // radius of cell corners
		_targetRadius = _cellW / 8;
		_starterRadius = _cellW / 16;
		_screwRadius = _cellW / 12;
		_screwDistance = _cellW / 5;
	};


	/**
	 * Calculate cells coordinate
	 */
	var calcCells = function() {
		var x, y,
			gy = _startY,
			counter = 0;
		for (var r = 0; r < _opt.rows; r++) {
			x = _startX;
			y = gy;
			gy += _cellH;
			for (var c = 0; c < _opt.columns; c++) {
				_cells.push({
					x: x,
					y: y,
					type: 'empty'
				});
				x += _cellW;
				counter++;
			}
		}
	};


	/**
	 * Assign cells types according to initial config
	 */
	var initCells = function() {
		var n = _opt.cells,
			len = n.length;
		// normal block cells
		for (var i = 0; i < len; i++) {
			for (var l = 0; l < n[i].arr.length; l++) {
				_cells[ n[i].arr[l] ].type = n[i].type;
			}
		}
		// none cells
		for (var l = 0; l < _opt.none.length; l++) {
			_cells[ _opt.none[l] ].type = 'none';
		}
	};


	/**
	 * Save targets coordinates
	 */
	var initTargets = function() {
		var o = _opt.targets,
			target;
		_targets = [];
		for (var i = 0; i < o.length; i++) {
			target = calcCoordinate(o[i].cell, o[i].side);
			_targets.push(target.x + '_' + target.y);
		}
		// console.log(_targets);
	};


	/**
	 * Reset victory targets
	 */
	var initVictory = function() {
		_victory = [];
		for (var i = 0; i < _targets.length; i++) {
			_victory.push(_targets[i]);
		}
	};


	/* Score victory point by removing the target from the stack
	 * @returns {boolean} true if won, false otherwise
	 */
	var checkVictory = function() {
		if (_victory.length === 0) {
			drawVictory();
			saveVictory(_opt.l1, _opt.l2);
			return true;
		}
		return false;
	};


	/**
	 * Draw the initial game
	 * @param {boolean} true if drawing current cells arrangement
	 */
	var drawStuff = function(current) {
		// draw cell numbers
		if (DEBUG === true) {
			drawCellNumbers();
		}

		// draw background cells
		drawLayerBg();

		// draw targets background
		drawTargetBg();

		if (current) {
			// draw current cells arrangement
			drawCurrentCells();
		}
		else {
			// draw normal cells
			drawLayerCells(_opt.cells);
		}

		// draw grid
		if (DEBUG === true) {
			drawGrid();
		}
	};


	/**
	 * Starts the lasers
	 */
	var initLasers = function() {
		_ctxs['laser'].clearRect(0, 0, _canvasW, _canvasH);
		resetPoints();
		_lasersCounter = 0;
		var n = _opt.lasers;
		for (var i = 0; i < n.length; i++) {
			_lasersCounter++;
			var t = calcCoordinate(n[i].cell, n[i].side);

			// draw starter point
			drawStarter(t.x, t.y);

			// save point
			savePoint(t.x, t.y, n[i].dir, i);

			// check if the point is a target
			checkPoint(t.x, t.y);

			// start drawing laser
			drawLaser(n[i].cell, n[i].side, n[i].dir, _lasersCounter);
		}
		// console.log(_points);
	};


	/**
	 * Draw cell from id
	 * @param {object} ctx - Canvas context to work on
	 * @param {number} cell - Cell id
	 */
	var drawCellFromId = function(ctx, cell) {
		var c = _cells[cell];
		drawCell(ctx, c.x, c.y, c.type);
	};


	/**
	 * Draw cell from id with the given type
	 * @param {object} ctx - Canvas context to work on
	 * @param {number} cell - Cell id
	 * @param {string} type - Cell type
	 */
	var drawCellFromType = function(ctx, cell, type) {
		var c = _cells[cell];
		drawCell(ctx, c.x, c.y, type);
	};


	/**
	 * Draw cell
	 * @param {object} ctx - Canvas context to work on
	 * @param {number} x - Starting point x coordinate
	 * @param {number} y - Starting point y coordinate
	 * @param {string} type - Cell type
	 */
	var drawCell = function(ctx, x, y, type) {
		var cx = x + _cellW/2, cy = y + _cellH/2;
		var r = _cellR;
		ctx.save();

			var stuck = type === 'mirror_stuck';
			// Base gradient
			var bg = ctx.createLinearGradient(x, y, x+_cellW, y+_cellH);
			bg.addColorStop(0, stuck ? '#6a7a8a' : '#c8e0f8');
			bg.addColorStop(0.5, stuck ? '#8a9aaa' : '#eaf4ff');
			bg.addColorStop(1, stuck ? '#4a5a6a' : '#9abcd8');
			ctx.shadowColor = 'rgba(120,200,255,0.5)';
			ctx.shadowBlur = stuck ? 4 : 10;
			ctx.fillStyle = bg;
			ctx.strokeStyle = stuck ? 'rgba(80,120,160,0.8)' : 'rgba(0,200,255,0.6)';
			ctx.lineWidth = stuck ? 1.5 : 1.5;
			drawRoundRect(ctx, x, y, _cellW, _cellH, r);
			ctx.fill(); ctx.stroke();
			// Diagonal mirror line
			ctx.shadowBlur = 0;
			ctx.strokeStyle = stuck ? 'rgba(60,80,100,0.5)' : 'rgba(255,255,255,0.9)';
			ctx.lineWidth = stuck ? 2 : 2.5;
			var pad = _cellW * 0.18;
			ctx.beginPath();
			ctx.moveTo(x + pad, y + _cellH - pad);
			ctx.lineTo(x + _cellW - pad, y + pad);
			ctx.stroke();

			if (!stuck) {

				ctx.lineTo(x + _cellW - pad, y + pad + _cellW*0.15);

		var pos = mousePositionElement(event),
			cell = getSelectedCell(pos.x, pos.y);

		if (cell === 0) {
			return;
		}

		// console.log(cell);

		// check if it's possible to move this cell
		if (_cells[cell].type === 'empty' ||
			_cells[cell].type === 'none' ||
			_cells[cell].type === 'mirror_stuck' ||
			_cells[cell].type === 'blackhole_stuck' ||
			_cells[cell].type === 'glass_stuck') {
			return false;
		}
		else {
			// clear canvas
			clearMovingCanvas();

			// draw cell at current mouse point
			drawCell(_ctxs['moving'], pos.x - _cellW_2, pos.y - _cellH_2, _cells[cell].type);

			_movingCell = cell;

			canvas.on('mousemove', updateLayerMoving);
			canvas.on('touchmove', updateLayerMoving);
			canvas.on('mouseup', pieceDropped);
			canvas.on('touchend', pieceDropped);
		}
	};


	/**
	 * Clear moving canvas
	 */
	var clearMovingCanvas = function() {
		_ctxs['moving'].clearRect(0, 0, _canvasW, _canvasH);
	};


	/**
	 * Clear cell
	 * @param {number} cell - Cell id
	 */
	var clearCell = function(cell) {
		_ctxs['cells'].clearRect( _cells[cell].x, _cells[cell].y, _cellW, _cellH );
	};


	/**
	 * Update moving layer while moving mouse
	 */
	var updateLayerMoving = function(event) {
		// console.log('moving');
		var pos = mousePositionElement(event);
		clearMovingCanvas();
		// draw cell at current mouse point
		drawCell(_ctxs['moving'], pos.x - _cellW_2, pos.y - _cellH_2, _cells[_movingCell].type);
	};


	/**
	 * Dropped piece
	 */
	var pieceDropped = function(event) {
		// console.log('dropped');
		canvas.removeEventListener('mousemove', updateLayerMoving);
		canvas.removeEventListener('touchmove', updateLayerMoving);
		canvas.removeEventListener('mouseup', pieceDropped);
		canvas.removeEventListener('touchend', pieceDropped);
		clearMovingCanvas();

		var pos = mousePositionElement(event),
			cell = getSelectedCell(pos.x, pos.y);

		if (cell === 0) {
			return;
		}

		// check if it's possible to drop the cell here
		if (_cells[cell].type === 'empty') {
			// update cells status
			_cells[cell].type = _cells[_movingCell].type;
			_cells[_movingCell].type = 'empty';

			// delete old cell
			clearCell(_movingCell);

			// draw new cell
			drawCellFromId(_ctxs['cells'], cell);

			// play sound
			if (_cells[cell].type === 'prism' || _cells[cell].type === 'mirror' || _cells[cell].type === 'glass' || _cells[cell].type === 'blackhole') {
				playSound(_cells[cell].type);
			}

			initVictory();

			// update lasers
			initLasers();

			// check victory
			checkVictory();
		}
		else {
			// nothing for the moment
		}

		// reset the moving cell id
		_movingCell = null;
	};


	/**
	 * Check if the laser goes through the cell
	 * @param {string} side - Side of the cell
	 * @param {string} dir - Laser direction
	 * @returns {boolean} true if the laser goes through
	 */
	var isPassingThrough = function(side, dir) {
		if (dir.indexOf(side) === -1) {
			return true;
		}
		return false;
	};


	/**
	 * Calc where is the next cell - same row, previous, next, same column, previous, next
	 * @param {string} side - Side we are leaving
	 * @returns {object} r is for row, c is for column
	 */
	var nextCellSide = function(side) {
		var row = 0,
			col = 0;

		switch(side) {
			case 'n':
				row = -1;
				break;

			case 'e':
				col = 1;
				break;

			case 's':
				row = 1;
				break;

			case 'w':
				col =-1;
				break;
		}

		return {r: row, c: col};
	};


	/**
	 * Calc row and columns of the selected cell
	 * @param {number} cell - Cell id
	 * @returns {object} r is for row, c is for column, false if cell doesn't exist
	 */
	var calcRowAndCol = function(cell) {
		var tot = _opt.rows * _opt.columns;

		if (cell <= 0 || cell > tot) {
			return false;
		}

		var row = 0,
			col = 0;

		row = Math.ceil(cell / _opt.columns);
		col = cell % _opt.columns;

		if (col === 0) {
			col = _opt.columns;
		}

		return {r: row, c: col};
	};


	/** Calc cell id from row and column position
	 * @param {number} row - Row
	 * @param {number} col - Column
	 * @returns {number} cell id
	 */
	var calcCellFromRowAndCol = function(row, col) {
		return (row - 1) * _opt.columns + col;
	};


	/**
	 * Calc next cell base on the current exit side
	 * @param {number} cell - Cell id
	 * @param {string} side - Current cell exit side
	 * @returns {number} next cell id
	 */
	var calcNextCell = function(cell, side) {
		var row = 0,
			col = 0,
			nextSide = nextCellSide(side),
			thisCell = calcRowAndCol(cell),
			nextCellId,
			tot = _opt.rows * _opt.columns;

		row = thisCell.r + nextSide.r;
		col = thisCell.c + nextSide.c;

		if (row <= 0 || row > _opt.rows || col <= 0 || col > _opt.columns) {
			return false;
		}

		nextCellId = calcCellFromRowAndCol(row, col);

		if (nextCellId <= 0 || nextCellId > tot) {
			return false;
		}

		return nextCellId;
	};


	/**
	 * Returns the opposite side of the given one
	 * @param {string} side - Previous cell side
	 * @returns {string} next cell side
	 */
	var oppositeSide = function(side) {
		var opposite;

		switch(side) {
			case 'n':
				opposite = 's';
				break;
			case 'e':
				opposite = 'w';
				break;
			case 's':
				opposite = 'n';
				break;
			case 'w':
				opposite = 'e';
				break;
		}

		return opposite;
	};


	/**
	 * Save point coordinates and laser direction
	 * @param {number} x - X coordinate
	 * @param {number} y - Y coordinate
	 * @param {string} dir - Laser direction
	 * @param {number} laser - laser id
	 */
	var savePoint = function(x, y, dir, laser) {
		_points.push({
			x: x,
			y: y,
			dir : dir,
			laser : laser
		});
	};


	/**
	 * Reset points stack
	 */
	var resetPoints = function() {
		_points = [];
	};


	/**
	 * Check if the same laser goes through the point with the same direction - to avoid infinite loops
	 * @param {number} x - X coordinate
	 * @param {number} y - Y coordinate
	 * @param {string} dir - Laser direction
	 * @param {number} laser - laser id
	 * @returns boolean - Returns true if it exists
	 */
	var isAlreadyPoint = function(x, y, dir, laser) {
		var l = _points.length;

		for (var i = 0; i < l; i++) {
			if (_points[i].x === x &&
				_points[i].y === y &&
				_points[i].dir === dir &&
				_points[i].laser === laser) {
				return true;
			}
		}

		return false;
	};


	/**
	 * Check if there is a laser that goes through the point with the same direction - to avoid infinite loops
	 * @param {number} x - X coordinate
	 * @param {number} y - Y coordinate
	 * @param {string} dir - Laser direction
	 * @returns boolean - Returns true if it exists
	 */
	var isAlreadyLaser = function(x, y, dir) {
		var l = _points.length;

		for (var i = 0; i < l; i++) {
			if (_points[i].x === x &&
				_points[i].y === y &&
				_points[i].dir === dir) {
				return true;
			}
		}

		return false;
	};


	/** Check if the point is a target
	 * @param {number} x - Center point x coordinate
	 * @param {number} y - Center point y coordinate
	 * @returns {boolean} true if is a target
	 */
	var isTargetPoint = function(x, y) {
		if (_targets.indexOf(x + '_' + y) === -1) {
			return false;
		}
		return true;
	};


	/**
	 * If the point is a target, light it up and sign in score
	 * @param {number} x - Point x coordinate
	 * @param {number} y - Point y coordinate
	 */
	var checkPoint = function(x, y) {
		if (isTargetPoint(x, y)) {
			drawTargetHit(x, y);

			var index = _victory.indexOf(x + '_' + y);
			if (index != -1) {
				_victory.splice(index, 1);
			}
		}
	};


	/**
	 * Draw the laser from the edge of the grid to the edge of the canvas
	 * @param {string} dir - Laser direction
	 * @param {number} x - Starting point x coordinate
	 * @param {number} y - Starting point y coordinate
	 */
	var drawEndingLaser = function(dir, x, y) {
		var angle = 0;
		switch(dir) {
			case 'se':
				angle = 45;
				break;
			case 'sw':
				angle = 135;
				break;
			case 'nw':
				angle = 225;
				break;
			case 'ne':
				angle = 315;
				break;
		}
		var radians = angle * (Math.PI / 180);
		// the canvas diagonal is the longest distance between two points,
		// therefore it's used to draw the ending laser
		var end = {
			x: x + _canvasD * Math.cos(radians),
			y: y + _canvasD * Math.sin(radians)
		};
		_ctxs['laser'].strokeStyle = COLORS.laser;
		drawLine(_ctxs['laser'], x, y, end.x, end.y);
	};


	/**
	 * Draw lasers
	 * @param {number} cell - Cell id
	 * @param {string} side - Side of the cell
	 * @param {string} dir - Laser direction
	 * @param {number} laserId - laser id 
	 */
	var drawLaser = function(cell, side, dir, laserId) {
		var endSide, endDir, endPoint;

		// calc entrance point coordinates
		var startPoint = calcCoordinate(cell, side);

		// check if the laser goes through the cell itself
		if (isPassingThrough(side, dir) === false) {
			endSide = side;
			endDir = dir;
			endPoint = startPoint;
		}
		else {
			switch(_cells[cell]['type']) {
				case 'empty':
				case 'none':
					endDir = dir;
					endSide = dir.replace(side, "").replace(oppositeSide(side), "");
					endPoint = calcCoordinate(cell, endSide);
					break;

				case 'mirror':
				case 'mirror_stuck':
					endSide = side;
					endDir = dir.replace(oppositeSide(endSide), endSide);
					endPoint = startPoint;
					break;

				case 'blackhole':
				case 'blackhole_stuck':
					return false;
					break;

				case 'glass':
				case 'glass_stuck':
					// laser #1 go through
					endDir = dir;
					endSide = dir.replace(side, "").replace(oppositeSide(side), "");
					endPoint = calcCoordinate(cell, endSide);
					// laser #2 reflects with a 90deg angle
					var endSide2 = side,
						endDir2 = dir.replace(oppositeSide(endSide2), endSide2);
					var cell2 = calcCoordinate(cell, endSide2)
					if (!isAlreadyLaser(cell2.x, cell2.y, endDir2)) {
						drawLaser(cell, endSide2, endDir2, _lasersCounter++);
					}
					break;

				case 'prism':
					endDir = dir;
					endSide = oppositeSide(side);
					endPoint = calcCoordinate(cell, endSide);
					break;
			}
		}

		// exit if this laser is going through an existing point with the same direction
		if (isAlreadyPoint(endPoint.x, endPoint.y, endDir, laserId)) {
			return false;
		}

		// save point
		savePoint(endPoint.x, endPoint.y, endDir, laserId);

		// check if the point is a target
		checkPoint(endPoint.x, endPoint.y);

		if (startPoint.x != endPoint.x || startPoint.y != endPoint.y) {
			// draw laser
			_ctxs['laser'].strokeStyle = COLORS.laser;
			drawLine(_ctxs['laser'], startPoint.x, startPoint.y, endPoint.x, endPoint.y);
		}

		// calc next cell, side, dir
		var nextCellId = calcNextCell(cell, endSide);
		var nextCellSide = oppositeSide(endSide);
		var nextCellDir = endDir;

		// draw a line to the edge of the canvas if out of the grid
		if (nextCellId === false) {
			drawEndingLaser(nextCellDir, endPoint.x, endPoint.y);
			return false;
		}

		// richiama questa funzione
		drawLaser(nextCellId, nextCellSide, nextCellDir);
	};
};
</script>

<script>
// ===== APP STATE =====
var l1 = 0, l2 = 0;
var game = null;
var currentScreen = 'menu';

// ===== PROGRESS =====
var victory = [];
try { if (localStorage.lazr_victory) victory = JSON.parse(localStorage.lazr_victory); } catch(e) {}

function isCompleted(gl1, gl2) {
  return victory.some(function(v) { return v.l1 === gl1-1 && v.l2 === gl2-1; });
}

function isUnlocked(gl1, gl2) {
  if (gl1 === 0 && gl2 === 0) return true; // always unlock first
  // unlock next in same group
  if (gl2 > 0) {
    return isCompleted(gl1+1, gl2) || isCompleted(gl1+1, gl2-1+1); // level before
  }
  // first of group: need to complete last of previous group
  if (gl1 > 0) {
    var prevGroup = levels[gl1-1];
    return isCompleted(gl1, prevGroup.length); // last level of prev group (1-indexed)
  }
  return false;
}

function isLevelUnlocked(gl1idx, gl2idx) {
  // gl1idx, gl2idx = 0-based indices
  if (gl1idx === 0 && gl2idx === 0) return true;
  // All levels in first group unlockable by completing previous
  // Simplified: first level of each group unlocked if previous group has any completion
  // Any level unlocked if the one before it is completed
  var prevL1 = gl1idx, prevL2 = gl2idx - 1;
  if (prevL2 < 0) {
    prevL1 = gl1idx - 1;
    if (prevL1 < 0) return false;
    prevL2 = levels[prevL1].length - 1;
  }
  return isCompleted(prevL1+1, prevL2+1) || (gl1idx === 0); // first group all unlocked initially after first
}

// First group is always fully unlocked
function isLevelAccessible(gl1idx, gl2idx) {
  if (gl1idx === 0) return true; // entire first group unlocked
  // A level is accessible if the previous one has been completed
  var prevL1 = gl1idx, prevL2 = gl2idx - 1;
  if (prevL2 < 0) {
    prevL1 = gl1idx - 1;
    if (prevL1 < 0) return true;
    prevL2 = levels[prevL1].length - 1;
  }
  return isCompleted(prevL1+1, prevL2+1);
}

// ===== SCREEN MANAGEMENT =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s) { addClass(s, 'hidden'); });
  var el = document.getElementById(id);
  removeClass(el, 'hidden');
  currentScreen = id;
}

function showMenu() {
  showScreen('screen-menu');
  updateMenuProgress();
  drawMenuPreview();
  closeSolutionPanel();
}

function showLevelSelect() {
  buildLevelSelect();
  showScreen('screen-levels');
  document.getElementById('levels-title').textContent = t('select-levels');
}

function showGame() {
  showScreen('screen-game');
  closeSolutionPanel();
  resizeGame();
  if (window.doLevelTransition) { doLevelTransition(function() { loadLevel(); }); } else { loadLevel(); }
}

// ===== LEVEL SELECT BUILD =====
function getDiffClass(b) {
  var d = (b || '').toLowerCase();
  if (d.indexOf('hard') > -1) return 'hard';
  if (d.indexOf('medium') > -1) return 'medium';
  return 'easy';
}

function buildLevelSelect() {
  var container = document.getElementById('level-groups');
  container.innerHTML = '';
  var totalCompleted = victory.length;
  var totalLevels = 0;
  for (var i = 0; i < levels.length; i++) totalLevels += levels[i].length;

  for (var gi = 0; gi < levels.length; gi++) {
    (function(gi) {
      var group = levels[gi];
      var name = levelsName[gi];
      var groupCompleted = 0;
      for (var li = 0; li < group.length; li++) {
        if (isCompleted(gi+1, li+1)) groupCompleted++;
      }

      var groupEl = document.createElement('div');
      groupEl.className = 'level-group';

      var header = document.createElement('div');
      header.className = 'level-group-header';
      header.innerHTML = '<span class="level-group-name">' + name.a + '</span>' +
        '<span class="diff-badge diff-' + getDiffClass(name.b) + '">' + name.b + '</span>' +
        '<span class="level-group-progress">' + groupCompleted + '/' + group.length + '</span>';
      groupEl.appendChild(header);

      // Progress bar
      var pb = document.createElement('div');
      pb.className = 'progress-bar';
      pb.innerHTML = '<div class="progress-fill" style="width:' + (groupCompleted/group.length*100) + '%"></div>';
      groupEl.appendChild(pb);
      groupEl.appendChild(document.createElement('br'));

      var grid = document.createElement('div');
      grid.className = 'level-grid';

      for (var li = 0; li < group.length; li++) {
        (function(gi, li) {
          var btn = document.createElement('button');
          btn.className = 'level-btn';
          btn.textContent = li + 1;
          var done = isCompleted(gi+1, li+1);
          var accessible = isLevelAccessible(gi, li);
          var isCurrent = (gi === l1 && li === l2 && currentScreen === 'screen-game');

          if (isCurrent) { btn.classList.add('current'); }
          else if (done) { btn.classList.add('completed'); }
          else if (accessible) { btn.classList.add('unlocked'); }
          else { btn.classList.add('locked'); }

          if (accessible) {
            btn.onclick = function() {
              l1 = gi; l2 = li;
              showGame();
            };
          }
          grid.appendChild(btn);
        })(gi, li);
      }
      groupEl.appendChild(grid);
      container.appendChild(groupEl);
    })(gi);
  }
}

// ===== GAME LOGIC =====
function loadLevel() {
  var opt = levels[l1][l2];
  if (!game) { game = new LaserGame(); }
  game.init(opt);
  updateHeader();
  eraseVictoryOverlay();
}

function updateHeader() {
  var name = levelsName[l1];
  var nameEl = document.getElementById('header-level-name');
  nameEl.textContent = name.a + ': ' + (l2 + 1);
  nameEl.classList.remove('flash-anim');
  void nameEl.offsetWidth; // reflow
  nameEl.classList.add('flash-anim');
  document.getElementById('header-level-sub').textContent = name.b;
  localStorage.lazr_l1 = l1;
  localStorage.lazr_l2 = l2;
}

function navLevel(dir) {
  eraseVictoryOverlay();
  closeSolutionPanel();
  l2 += dir;
  if (l2 >= levels[l1].length) { l2 = 0; l1++; if (l1 >= levels.length) l1 = 0; }
  if (l2 < 0) { l1--; if (l1 < 0) l1 = levels.length - 1; l2 = levels[l1].length - 1; }
  doLevelTransition ? doLevelTransition(function() { loadLevel(); }) : loadLevel();
}

function resizeGame() {
  var area = document.getElementById('game-area');
  var w = area.clientWidth;
  var h = area.clientHeight;
  LAYOUT.maxWidth = w;
  LAYOUT.maxHeight = h;
  if (game) { game.reload(w, h); }
}

// ===== VICTORY =====
window.drawVictory = function() {
  var overlay = document.getElementById('victory-overlay');
  var sub = document.getElementById('victory-sub');
  sub.textContent = t('level-completed');
  addClass(overlay, 'show');
};

window.saveVictory = function(vl1, vl2) {
  var _l1 = vl1 - 1, _l2 = vl2 - 1;
  if (!isCompleted(vl1, vl2)) {
    victory.push({ l1: _l1, l2: _l2 });
    if (window.localStorage) localStorage.lazr_victory = JSON.stringify(victory);
  }
};

function eraseVictoryOverlay() {
  removeClass(document.getElementById('victory-overlay'), 'show');
}

function nextLevelFromVictory() {
  eraseVictoryOverlay();
  navLevel(1);
}

function victoryToLevels() {
  eraseVictoryOverlay();
  showLevelSelect();
}

// ===== SOLUTION =====
function showSolution() {
  if (game) game.solution();
}

function toggleSolutionPanel() {
  var p = document.getElementById('solution-panel');
  if (p.classList.contains('show')) { p.classList.remove('show'); }
  else { p.classList.add('show'); }
}
function closeSolutionPanel() {
  document.getElementById('solution-panel').classList.remove('show');
}

// ===== SETTINGS =====
function showSettings() {
  var m = document.getElementById('settings-modal');
  m.style.display = 'flex';
}
function closeSettings() {
  document.getElementById('settings-modal').style.display = 'none';
}
document.getElementById('settings-modal').addEventListener('click', function(e) {
  if (e.target === this) closeSettings();
});

function resetProgress() {
  if (window.confirm(t('reset') + '?')) {
    victory = [];
    localStorage.lazr_victory = JSON.stringify(victory);
    if (currentScreen === 'screen-levels') buildLevelSelect();
  }
  closeSettings();
}

// ===== RESIZE =====
var optimizedResize = (function() {
  var running = false, timeoutID;
  function resize() {
    if (!running) {
      running = true;
      if (window.requestAnimationFrame) { window.requestAnimationFrame(run); }
      else { clearTimeout(timeoutID); timeoutID = setTimeout(run, 500); }
    }
  }
  function run() { resizeGame(); running = false; }
  return {
    init: function() { window.addEventListener('resize', resize); },
    stop: function() { window.removeEventListener('resize', resize); }
  };
})();

var $toggleResize = document.getElementById('toggle-resize');
var $toggleAudio = document.getElementById('toggle-audio');

if (localStorage.lazr_resize === 'true') { $toggleResize.checked = true; optimizedResize.init(); }
$toggleResize.addEventListener('change', function() {
  localStorage.lazr_resize = this.checked;
  if (this.checked) { resizeGame(); optimizedResize.init(); }
  else { optimizedResize.stop(); }
});

// Audio
window.AudioContext = window.AudioContext || window.webkitAudioContext;
if (window.AudioContext) {
  if (localStorage.lazr_audio === 'true') $toggleAudio.checked = true;
  $toggleAudio.addEventListener('change', function() {
    localStorage.lazr_audio = this.checked;
  });
} else {
  $toggleAudio.parentNode.parentNode.style.display = 'none';
}

// ===== MENU PROGRESS =====
function updateMenuProgress() {
  var total = 0;
  for (var i = 0; i < levels.length; i++) total += levels[i].length;
  var label = document.getElementById('menu-progress-label');
  label.textContent = victory.length + ' / ' + total + ' levels completed';
}

// ===== MENU PREVIEW ANIMATION =====
function drawMenuPreview() {
  var c = document.getElementById('menu-preview');
  if (!c.getContext) return;
  var ctx = c.getContext('2d');
  var w = c.width, h = c.height;
  ctx.clearRect(0, 0, w, h);

  // Draw a simple animated laser path
  var time = Date.now() / 1000;
  var grid = 5; var cw = w / (grid + 1), ch = h / (grid + 1);
  var startX = cw, startY = h / 2;

  // Draw cells
  ctx.strokeStyle = 'rgba(26,45,68,0.8)'; ctx.lineWidth = 1;
  for (var r = 0; r < grid; r++) {
    for (var cc = 0; cc < grid; cc++) {
      var cx2 = cw + cc * cw, cy = ch + r * ch;
      var d = cw * 0.1;
      ctx.fillStyle = 'rgba(17,29,46,0.9)';
      ctx.beginPath();
      ctx.roundRect(cx2 + d, cy + d, cw - d*2, ch - d*2, 4);
      ctx.fill(); ctx.stroke();
    }
  }

  // Animated laser
  ctx.save();
  ctx.shadowColor = '#ff2200'; ctx.shadowBlur = 8;
  ctx.strokeStyle = '#ff2200'; ctx.lineWidth = 1.5;
  var pts = [
    {x: 0, y: h/2},
    {x: w * 0.3, y: h/2},
    {x: w * 0.3, y: h * 0.25},
    {x: w * 0.6, y: h * 0.25},
    {x: w * 0.6, y: h * 0.7},
    {x: w, y: h * 0.7}
  ];
  // Animate by drawing partial path
  var progress = (Math.sin(time * 0.8) * 0.5 + 0.5);
  var totalLen = 0;
  for (var i = 1; i < pts.length; i++) {
    totalLen += Math.hypot(pts[i].x - pts[i-1].x, pts[i].y - pts[i-1].y);
  }
  var drawLen = progress * totalLen;
  ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
  var drawn = 0;
  for (var i = 1; i < pts.length; i++) {
    var segLen = Math.hypot(pts[i].x - pts[i-1].x, pts[i].y - pts[i-1].y);
    if (drawn + segLen >= drawLen) {
      var frac = (drawLen - drawn) / segLen;
      ctx.lineTo(pts[i-1].x + (pts[i].x - pts[i-1].x) * frac, pts[i-1].y + (pts[i].y - pts[i-1].y) * frac);
      break;
    }
    ctx.lineTo(pts[i].x, pts[i].y);
    drawn += segLen;
  }
  ctx.stroke();
  // Target circles
  ctx.fillStyle = '#ff2200'; ctx.shadowBlur = 12;
  ctx.beginPath(); ctx.arc(w, h * 0.7, 5, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  requestAnimationFrame(drawMenuPreview);
}

// ===== INIT =====
window.addEventListener('DOMContentLoaded', function() {
  // Restore last level
  try {
    var rl1 = parseInt(localStorage.lazr_l1);
    var rl2 = parseInt(localStorage.lazr_l2);
    if (!isNaN(rl1) && !isNaN(rl2) && levels[rl1] && levels[rl1][rl2]) {
      l1 = rl1; l2 = rl2;
    }
  } catch(e) {}

  applyLang();
  showMenu();
});

// ===== CLICK OUTSIDE SOLUTION PANEL =====
document.addEventListener('click', function(e) {
  var panel = document.getElementById('solution-panel');
  var hintBtn = document.getElementById('hint-btn');
  if (panel.classList.contains('show') && !panel.contains(e.target) && !hintBtn.contains(e.target)) {
    closeSolutionPanel();
  }
});
</script>

<script>
// ===== PARTICLE SYSTEM =====
var particles = [];
var particleCanvas, particleCtx;

function initParticleLayer() {
  particleCanvas = document.createElement('canvas');
  particleCanvas.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:45;';
  document.body.appendChild(particleCanvas);
  particleCtx = particleCanvas.getContext('2d');
  resizeParticleCanvas();
  window.addEventListener('resize', resizeParticleCanvas);
  requestAnimationFrame(animateParticles);
}

function resizeParticleCanvas() {
  particleCanvas.width = window.innerWidth;
  particleCanvas.height = window.innerHeight;
}

function spawnParticles(x, y, count, color, type) {
  for (var i = 0; i < count; i++) {
    var angle = Math.random() * Math.PI * 2;
    var speed = Math.random() * 4 + 1;
    var size = type === 'star' ? (Math.random() * 6 + 2) : (Math.random() * 4 + 1);
    particles.push({
      x: x, y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - (type === 'victory' ? 3 : 0),
      size: size,
      color: color || '#ff6600',
      alpha: 1,
      decay: Math.random() * 0.02 + 0.015,
      type: type || 'spark',
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.2,
      gravity: type === 'victory' ? 0.08 : 0.04,
      emoji: type === 'star' ? ['⭐','✨','💫','🌟'][Math.floor(Math.random()*4)] : null
    });
  }
}

function spawnVictoryBurst(canvasEl) {
  var rect = canvasEl.getBoundingClientRect();
  var cx = rect.left + rect.width / 2;
  var cy = rect.top + rect.height / 2;
  var colors = ['#ffcc00','#ff6600','#ff00aa','#00eeff','#aaffaa','#ff4444','#ffffff'];
  for (var i = 0; i < 80; i++) {
    var color = colors[Math.floor(Math.random() * colors.length)];
    var angle = Math.random() * Math.PI * 2;
    var speed = Math.random() * 8 + 2;
    var isEmoji = Math.random() < 0.3;
    particles.push({
      x: cx + (Math.random()-0.5)*80, y: cy + (Math.random()-0.5)*80,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 4,
      size: isEmoji ? 20 : (Math.random() * 8 + 3),
      color: color,
      alpha: 1,
      decay: Math.random() * 0.012 + 0.008,
      type: isEmoji ? 'emoji' : 'victory',
      gravity: 0.12,
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.15,
      emoji: isEmoji ? ['⚡','🌟','💥','✨','🎉','⭐'][Math.floor(Math.random()*6)] : null
    });
  }
}

function spawnTargetHitParticles(x, y) {
  // Convert canvas coords to screen coords
  var gameArea = document.getElementById('game-area');
  var rect = gameArea.getBoundingClientRect();
  var canvas = document.getElementById('game-main');
  var scaleX = rect.width / (canvas.width || 1);
  var scaleY = rect.height / (canvas.height || 1);
  var sx = rect.left + x * scaleX;
  var sy = rect.top + y * scaleY;
  var colors = ['#ffcc00','#ff8800','#ffffff','#ffee44'];
  for (var i = 0; i < 18; i++) {
    var angle = Math.random() * Math.PI * 2;
    var speed = Math.random() * 3 + 0.5;
    particles.push({
      x: sx, y: sy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1,
      size: Math.random() * 4 + 1,
      color: colors[Math.floor(Math.random()*colors.length)],
      alpha: 1,
      decay: Math.random() * 0.03 + 0.02,
      type: 'spark',
      gravity: 0.05,
      rotation: 0, rotSpeed: 0
    });
  }
}

function animateParticles() {
  requestAnimationFrame(animateParticles);
  if (!particleCtx) return;
  particleCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);

  particles = particles.filter(function(p) {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += p.gravity || 0.04;
    p.vx *= 0.98;
    p.alpha -= p.decay;
    p.rotation += p.rotSpeed || 0;
    if (p.alpha <= 0) return false;

    particleCtx.save();
    particleCtx.globalAlpha = Math.max(0, p.alpha);
    particleCtx.translate(p.x, p.y);
    particleCtx.rotate(p.rotation || 0);

    if (p.emoji) {
      particleCtx.font = p.size + 'px serif';
      particleCtx.textAlign = 'center';
      particleCtx.textBaseline = 'middle';
      particleCtx.fillText(p.emoji, 0, 0);
    } else if (p.type === 'victory') {
      // Confetti rectangle
      particleCtx.fillStyle = p.color;
      particleCtx.shadowColor = p.color;
      particleCtx.shadowBlur = 4;
      particleCtx.fillRect(-p.size/2, -p.size/4, p.size, p.size/2);
    } else {
      // Spark circle with glow
      particleCtx.shadowColor = p.color;
      particleCtx.shadowBlur = p.size * 2;
      particleCtx.fillStyle = p.color;
      particleCtx.beginPath();
      particleCtx.arc(0, 0, p.size/2, 0, Math.PI*2);
      particleCtx.fill();
    }
    particleCtx.restore();
    return true;
  });
}

// ===== LEVEL TRANSITION =====
var transitionOverlay = null;

function createTransitionOverlay() {
  transitionOverlay = document.createElement('div');
  transitionOverlay.style.cssText = [
    'position:fixed;inset:0;z-index:60;pointer-events:none;',
    'display:flex;align-items:center;justify-content:center;',
    'background:transparent;'
  ].join('');
  document.body.appendChild(transitionOverlay);
}

function doLevelTransition(callback) {
  if (!transitionOverlay) createTransitionOverlay();
  
  // Flash + slide out
  var panel = document.createElement('div');
  panel.style.cssText = [
    'position:absolute;inset:0;',
    'background:linear-gradient(135deg,rgba(0,20,40,0.95),rgba(0,5,20,0.98));',
    'display:flex;flex-direction:column;align-items:center;justify-content:center;',
    'transform:translateY(100%);',
    'transition:transform 0.35s cubic-bezier(0.16,1,0.3,1);',
  ].join('');
  
  var label = document.createElement('div');
  label.style.cssText = 'font-family:Orbitron,monospace;font-size:24px;font-weight:900;color:#00e5ff;letter-spacing:0.2em;text-shadow:0 0 30px rgba(0,229,255,0.8);opacity:0;transition:opacity 0.2s 0.15s;';
  label.textContent = 'LEVEL ' + (l2 + 1);
  var sublabel = document.createElement('div');
  sublabel.style.cssText = 'font-family:Orbitron,monospace;font-size:12px;color:rgba(0,229,255,0.6);letter-spacing:0.3em;margin-top:8px;opacity:0;transition:opacity 0.2s 0.2s;';
  sublabel.textContent = levelsName[l1] ? levelsName[l1].a.toUpperCase() : '';
  
  // Scan line animation
  var scan = document.createElement('div');
  scan.style.cssText = 'position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(0,229,255,0.8),transparent);top:-2px;animation:scan-down 0.5s ease-out forwards;';
  
  panel.appendChild(label);
  panel.appendChild(sublabel);
  panel.appendChild(scan);
  transitionOverlay.appendChild(panel);
  
  // Add scan animation
  if (!document.getElementById('scan-style')) {
    var sty = document.createElement('style');
    sty.id = 'scan-style';
    sty.textContent = '@keyframes scan-down{from{top:-2px;opacity:1}to{top:100%;opacity:0}}';
    document.head.appendChild(sty);
  }
  
  // Slide in
  requestAnimationFrame(function() {
    setTimeout(function() {
      panel.style.transform = 'translateY(0)';
      setTimeout(function() {
        label.style.opacity = '1';
        sublabel.style.opacity = '1';
      }, 50);
    }, 10);
  });
  
  // Hold, then slide out
  setTimeout(function() {
    callback();
    label.textContent = 'LEVEL ' + (l2 + 1);
    sublabel.textContent = levelsName[l1] ? levelsName[l1].a.toUpperCase() : '';
    setTimeout(function() {
      panel.style.transition = 'transform 0.3s cubic-bezier(0.7,0,0.84,0)';
      panel.style.transform = 'translateY(-100%)';
      setTimeout(function() {
        transitionOverlay.removeChild(panel);
      }, 350);
    }, 300);
  }, 500);
}

// ===== HOOK VICTORY BURST =====
var _origDrawVictory = window.drawVictory;
window.drawVictory = function() {
  _origDrawVictory();
  var canvas = document.getElementById('game-main');
  if (canvas) spawnVictoryBurst(canvas);
};

// ===== HOOK LEVEL NAV WITH TRANSITION =====
var _navLevelOrig = window.navLevel;
window.navLevel = function(dir) {
  // Calculate new l1/l2
  var nl1 = l1, nl2 = l2 + dir;
  if (nl2 >= levels[nl1].length) { nl2 = 0; nl1++; if (nl1 >= levels.length) nl1 = 0; }
  if (nl2 < 0) { nl1--; if (nl1 < 0) nl1 = levels.length - 1; nl2 = levels[nl1].length - 1; }
  eraseVictoryOverlay();
  closeSolutionPanel();
  l1 = nl1; l2 = nl2;
  doLevelTransition(function() {
    loadLevel();
  });
};

// Also wrap level select click with transition
var _showGameOrig = window.showGame;
window.showGame = function() {
  _showGameOrig();
  // Small stagger delay so screen transition completes first
  setTimeout(function() {
    doLevelTransition(function() { loadLevel(); });
  }, 300);
  // Override the loadLevel call in showGame
};

// But showGame calls loadLevel() itself - we need to prevent double load
// Patch: override to only set up the screen, not load level
window.showGame = function() {
  showScreen('screen-game');
  closeSolutionPanel();
  resizeGame();
  doLevelTransition(function() { loadLevel(); });
};

// ===== ANIMATED LASER PULSE on bg canvas =====
// Add subtle pulse animation to targets
var _pulseFrame = 0;
var _pulsing = false;

function startTargetPulse() {
  if (_pulsing) return;
  _pulsing = true;
  function pulse() {
    if (!_pulsing) return;
    _pulseFrame++;
    // Trigger a repaint of target bg with pulse
    if (window._game_redrawTargetBg) window._game_redrawTargetBg();
    requestAnimationFrame(pulse);
  }
  requestAnimationFrame(pulse);
}

// ===== CELL DROP ANIMATION =====
// Track drop animations
var cellDropAnims = [];

function animateCellDrop(x, y) {
  var gameArea = document.getElementById('game-area');
  var rect = gameArea.getBoundingClientRect();
  var canvas = document.getElementById('game-main');
  var scaleX = rect.width / (canvas.width || 1);
  var sy = rect.top + y * scaleX;
  var sx = rect.left + x * scaleX;
  spawnTargetHitParticles(x / scaleX, y / scaleX);
  // Ripple effect
  var ripple = document.createElement('div');
  ripple.style.cssText = [
    'position:fixed;border-radius:50%;pointer-events:none;z-index:46;',
    'border:2px solid rgba(0,229,255,0.8);',
    'width:10px;height:10px;',
    'left:' + (sx - 5) + 'px;top:' + (sy - 5) + 'px;',
    'animation:cell-ripple 0.5s ease-out forwards;'
  ].join('');
  document.body.appendChild(ripple);
  setTimeout(function() { document.body.removeChild(ripple); }, 600);
}

// Add ripple CSS
(function() {
  var s = document.createElement('style');
  s.textContent = '@keyframes cell-ripple{from{width:10px;height:10px;left:var(--x);top:var(--y);opacity:1}to{width:80px;height:80px;margin-left:-35px;margin-top:-35px;opacity:0;}}';
  document.head.appendChild(s);
})();

// ===== INIT =====
window.addEventListener('DOMContentLoaded', function() {
  initParticleLayer();
});
</script>
</body>
