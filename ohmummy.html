<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>😶 Oh Emoji!</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@800&display=swap');

/* ── CONFIG ── */
:root {
  --bg:    #fff9f0;
  --hud:   #ff6b6b;
  --huds:  #cc0000;
  --tomb:  #b39ddb;
  --tombd: #7c3aed;
  --path0: #fff3cd;
  --path1: #ffe082;
  --green: #43e97b;
  --blue:  #4fc3f7;
  --pink:  #f48fb1;
  --yell:  #ffd54f;
  --text:  #2d1b00;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; touch-action:none; user-select:none; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh; width: 100dvw;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}

/* ════════════ SCREENS ════════════ */
.screen { display:none; position:absolute; inset:0; align-items:center; justify-content:center; flex-direction:column; }
.screen.on { display:flex; }

/* ════════════ TITLE ════════════ */
#sTitle {
  background: linear-gradient(135deg,#fff9f0 0%,#fce4ec 30%,#e3f2fd 65%,#f3e5f5 100%);
  gap: 10px; padding: 24px;
  animation: bgShift 6s ease-in-out infinite alternate;
}
@keyframes bgShift {
  from { filter: hue-rotate(0deg); }
  to   { filter: hue-rotate(20deg); }
}

.t-face { font-size: clamp(70px,15vw,120px); animation: spin 4s ease-in-out infinite; display:block; }
@keyframes spin { 0%,100%{transform:rotate(-8deg) scale(1)} 50%{transform:rotate(8deg) scale(1.12)} }

.t-name {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(36px,9vw,88px);
  background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #c77dff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  filter: drop-shadow(2px 3px 0 rgba(0,0,0,0.12));
  animation: rainbow 3s linear infinite;
  background-size: 200% auto;
}
@keyframes rainbow { to { background-position: 200% center; } }

.t-sub { font-family:'Fredoka One',cursive; font-size:clamp(12px,2.8vw,18px); color:#e65100; letter-spacing:3px; }

.t-btns { display:flex; flex-direction:column; gap:10px; width:min(240px,78%); margin-top:14px; }

/* ════════════ BUTTONS ════════════ */
.btn {
  font-family:'Fredoka One',cursive; font-size:clamp(15px,3.2vw,20px);
  padding:12px 28px; border:none; border-radius:50px; cursor:pointer;
  transition:transform .12s, box-shadow .12s; letter-spacing:1px;
}
.btn:active { transform:scale(0.92) translateY(3px)!important; box-shadow:none!important; }
.btn-r  { background:#ff6b6b; color:#fff; box-shadow:0 5px 0 #c62828; }
.btn-r:hover  { transform:translateY(-2px); box-shadow:0 7px 0 #c62828; }
.btn-y  { background:#ffd93d; color:#5d4000; box-shadow:0 5px 0 #f9a825; }
.btn-y:hover  { transform:translateY(-2px); box-shadow:0 7px 0 #f9a825; }
.btn-g  { background:#6bcb77; color:#fff; box-shadow:0 5px 0 #388e3c; }
.btn-g:hover  { transform:translateY(-2px); box-shadow:0 7px 0 #388e3c; }
.btn-b  { background:#4d96ff; color:#fff; box-shadow:0 5px 0 #1565c0; }
.btn-b:hover  { transform:translateY(-2px); box-shadow:0 7px 0 #1565c0; }
.btn-p  { background:#c77dff; color:#fff; box-shadow:0 5px 0 #7b1fa2; }
.btn-p:hover  { transform:translateY(-2px); box-shadow:0 7px 0 #7b1fa2; }
.btn-ghost { background:transparent; color:#7c3aed; border:2.5px solid #7c3aed; box-shadow:none; }
.btn-ghost:hover { background:rgba(124,58,237,.08); }

/* ════════════ HUD ════════════ */
#hud {
  position:fixed; top:0; left:0; right:0; z-index:200;
  display:flex; align-items:center; gap:6px; flex-wrap:wrap;
  padding:5px 10px;
  background: var(--hud);
  box-shadow: 0 3px 0 var(--huds);
}
.hpill {
  display:flex; align-items:center; gap:4px;
  background:rgba(255,255,255,0.22); border-radius:20px; padding:3px 9px;
  font-family:'Fredoka One',cursive; font-size:clamp(11px,2.2vw,15px); color:#fff;
}
.hpill .lbl { font-size:.68em; opacity:.75; }
.hpill .val { color:#fff9c4; }
#hLives { background:none; padding:0; gap:1px; }
.hlife { font-size:clamp(13px,2.3vw,17px); transition:all .3s; }
.hlife.lost { filter:grayscale(1) opacity(.3); }
#hPU { gap:3px; }
.hpu { font-size:16px; }
#dbgBadge { display:none; background:rgba(220,38,38,.85); border-radius:20px; padding:3px 9px; font-family:'Fredoka One',cursive; font-size:11px; color:#fff; }

/* ════════════ GAME SCREEN ════════════ */
#sGame { background:var(--bg); flex-direction:column; padding-top:42px; }
#gameArea { flex:1; display:flex; align-items:center; justify-content:center; width:100%; overflow:hidden; }
#cv { display:block; }

/* ════════════ MOBILE DPAD ════════════ */
#dpad {
  display:none; position:fixed; bottom:0; left:0; right:0; height:144px;
  background:linear-gradient(0deg,#fff3cd,#fffde7);
  border-top:3px solid #ffd93d;
  z-index:200; justify-content:center; align-items:center;
}
.dp { display:grid; grid-template-columns:52px 52px 52px; grid-template-rows:52px 52px 52px; gap:5px; }
.dpb {
  background:#fff; border:3px solid #ffd93d; border-radius:14px;
  font-size:22px; display:flex; align-items:center; justify-content:center;
  cursor:pointer; box-shadow:0 4px 0 #f9a825; transition:all .1s;
}
.dpb:active { box-shadow:none; transform:translateY(4px); }

/* ════════════ OVERLAYS ════════════ */
.ov {
  position:fixed; inset:0; background:rgba(0,0,0,.45); backdrop-filter:blur(5px);
  z-index:300; display:none; align-items:center; justify-content:center; flex-direction:column; gap:12px;
}
.ov.on { display:flex; animation:fadeIn .3s; }
.ovbox {
  background:#fff; border:4px solid var(--hud); border-radius:28px;
  padding:clamp(16px,4vw,36px); text-align:center; max-width:340px; width:90%;
  box-shadow:0 7px 0 var(--huds), 0 16px 40px rgba(0,0,0,.18);
  animation:popIn .32s cubic-bezier(.34,1.56,.64,1);
}
.ovtitle { font-family:'Fredoka One',cursive; font-size:clamp(22px,5vw,38px); color:var(--hud); margin-bottom:5px; }
.ovsub   { font-size:clamp(12px,2.3vw,15px); color:#6b7280; margin-bottom:10px; }
.ovbtns  { display:flex; gap:9px; flex-wrap:wrap; justify-content:center; margin-top:9px; }

/* ════════════ PHASE OVERLAY ════════════ */
#phaseOv {
  position:fixed; inset:0; z-index:400; display:none; pointer-events:none;
  align-items:center; justify-content:center; flex-direction:column; gap:8px;
}
#phaseOv.on { display:flex; }
.phBig  { font-size:80px; animation:phasePop .5s cubic-bezier(.34,1.56,.64,1); }
.phText {
  font-family:'Fredoka One',cursive; font-size:clamp(20px,6vw,46px);
  color:#ff6b6b; text-shadow:2px 2px 0 #ffd93d, 4px 4px 0 rgba(0,0,0,.1);
  animation:phasePop .5s cubic-bezier(.34,1.56,.64,1) .06s both;
}

/* ════════════ FLOAT SCORE ════════════ */
.fscore {
  position:fixed; font-family:'Fredoka One',cursive; font-size:clamp(14px,3.5vw,22px);
  pointer-events:none; z-index:500; animation:floatUp 1.1s ease-out forwards;
  text-shadow:1px 1px 0 rgba(0,0,0,.2);
}

/* ════════════ LEVEL SELECT ════════════ */
#sLevels {
  background:linear-gradient(135deg,#fff9f0,#fce4ec 40%,#e3f2fd 80%,#f3e5f5);
  justify-content:flex-start; padding:12px 0 20px; overflow-y:auto;
}
.lvl-h { font-family:'Fredoka One',cursive; font-size:clamp(20px,5vw,32px); color:#ff6b6b; margin:6px 0 10px; }
.lvl-grid { display:grid; grid-template-columns:repeat(10,1fr); gap:5px; max-width:560px; width:94%; margin:0 auto; }
.lvlbtn {
  aspect-ratio:1; border-radius:12px; border:3px solid #e5e7eb; background:#f9fafb;
  font-family:'Fredoka One',cursive; font-size:clamp(9px,1.6vw,12px); color:#6b7280;
  cursor:pointer; transition:all .14s; display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:1px; box-shadow:0 3px 0 #d1d5db;
}
.lvlbtn .lem { font-size:clamp(10px,2.2vw,16px); }
.lvlbtn.done { border-color:#6bcb77; background:#f0fdf4; color:var(--text); box-shadow:0 3px 0 #388e3c; }
.lvlbtn.open { border-color:#ffd93d; background:#fffde7; color:var(--text); box-shadow:0 3px 0 #f9a825; }
.lvlbtn.open:hover { transform:translateY(-2px) scale(1.07); }
.lvlbtn.locked { opacity:.35; cursor:not-allowed; box-shadow:none; }

/* ════════════ SCORES ════════════ */
#sScores {
  background:linear-gradient(135deg,#fff9f0,#fce4ec 40%,#e3f2fd);
  gap:8px; padding:16px 12px;
}
.sc-row {
  display:flex; align-items:center; gap:8px; font-size:clamp(12px,2.3vw,15px);
  padding:9px 14px; border-radius:14px; width:min(340px,92%);
  background:#fff; border:2px solid #e5e7eb; box-shadow:0 3px 0 #d1d5db;
}
.sc-pos { font-family:'Fredoka One',cursive; font-size:1.2em; min-width:26px; }
.sc-pts { font-family:'Fredoka One',cursive; color:#ff6b6b; margin-left:auto; }

/* ════════════ HOW TO ════════════ */
#sHow {
  background:linear-gradient(135deg,#fff9f0,#fce4ec 40%,#e3f2fd);
  gap:9px; padding:14px;
}
.how-card { background:#fff; border:2.5px solid #ffe082; border-radius:16px; padding:12px 16px; width:min(360px,95%); box-shadow:0 3px 0 #f9a825; }
.how-t { font-family:'Fredoka One',cursive; font-size:clamp(14px,3vw,19px); color:#ff6b6b; margin-bottom:5px; }
.how-b { font-size:clamp(11px,2.3vw,14px); color:#374151; line-height:1.55; }

/* ════════════ ANIMATIONS ════════════ */
@keyframes fadeIn  { from{opacity:0} to{opacity:1} }
@keyframes popIn   { from{opacity:0;transform:scale(.45)} to{opacity:1;transform:scale(1)} }
@keyframes phasePop{ from{opacity:0;transform:scale(.2) rotate(-15deg)} to{opacity:1;transform:scale(1) rotate(0)} }
@keyframes floatUp { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-72px) scale(1.3)} }
@keyframes shake   { 0%,100%{transform:translateX(0)} 25%,75%{transform:translateX(-7px)} 50%{transform:translateX(7px)} }

.langBtn.active { outline: 3px solid #ff6b6b; outline-offset: 2px; transform: scale(1.08); }

@media (max-width:600px),(hover:none) {
  #dpad { display:flex; }
  #sGame { padding-bottom:144px; }
}
</style>
</head>
<body>

<!-- ══════════ TITLE ══════════ -->
<div class="screen on" id="sTitle">
  <span class="t-face">😶</span>
  <div class="t-name" id="tName">Oh Emoji!</div>
  <div class="t-sub" id="tSub">✨ ¡Rodea las tumbas! ✨</div>
  <!-- Language switcher -->
  <div style="display:flex;gap:7px;margin:6px 0">
    <button class="btn langBtn" data-lang="es" onclick="setLang('es')" style="padding:5px 13px;font-size:13px;background:#fce4ec;color:#c62828;box-shadow:0 3px 0 #e57373;border:none;border-radius:20px;cursor:pointer;font-family:'Fredoka One',cursive">🇪🇸 ES</button>
    <button class="btn langBtn" data-lang="en" onclick="setLang('en')" style="padding:5px 13px;font-size:13px;background:#e3f2fd;color:#1565c0;box-shadow:0 3px 0 #90caf9;border:none;border-radius:20px;cursor:pointer;font-family:'Fredoka One',cursive">🇬🇧 EN</button>
    <button class="btn langBtn" data-lang="fr" onclick="setLang('fr')" style="padding:5px 13px;font-size:13px;background:#f3e5f5;color:#6a1b9a;box-shadow:0 3px 0 #ce93d8;border:none;border-radius:20px;cursor:pointer;font-family:'Fredoka One',cursive">🇫🇷 FR</button>
  </div>
  <div class="t-btns">
    <button class="btn btn-r" id="btnPlay" onclick="goLevels()">🎮 JUGAR</button>
    <button class="btn btn-y" id="btnRecords" onclick="goScreen('sScores');buildScores()">🏆 RÉCORDS</button>
    <button class="btn btn-g" id="btnHow" onclick="goScreen('sHow')">📖 CÓMO JUGAR</button>
  </div>
  <div id="tAutosave" style="margin-top:10px;font-size:11px;color:#9ca3af">💾 Progreso guardado automáticamente</div>
</div>

<!-- ══════════ HOW TO ══════════ -->
<div class="screen" id="sHow">
  <div id="howTitle" style="font-family:'Fredoka One',cursive;font-size:clamp(20px,5vw,30px);color:#ff6b6b;margin:14px 0 4px">📖 Cómo jugar</div>
  <div class="how-card"><div class="how-t" id="h1t">🎯 Objetivo</div><div class="how-b" id="h1b"></div></div>
  <div class="how-card"><div class="how-t" id="h2t">🕹️ Controles</div><div class="how-b" id="h2b"></div></div>
  <div class="how-card"><div class="how-t" id="h3t">⚡ Power-ups</div><div class="how-b" id="h3b"></div></div>
  <div class="how-card"><div class="how-t" id="h4t">😈 Enemigos</div><div class="how-b" id="h4b"></div></div>
  <button class="btn btn-ghost backBtn" style="margin-top:8px" onclick="goScreen('sTitle')">↩ Volver</button>
</div>

<!-- ══════════ LEVELS ══════════ -->
<div class="screen" id="sLevels">
  <div class="lvl-h" id="chooseLvl">🗺️ Elige nivel</div>
  <div class="lvl-grid" id="lvlGrid"></div>
  <button class="btn btn-ghost backBtn" style="margin:12px 0" onclick="goScreen('sTitle')">↩ Volver</button>
</div>

<!-- ══════════ SCORES ══════════ -->
<div class="screen" id="sScores">
  <div style="font-family:'Fredoka One',cursive;font-size:clamp(20px,5vw,30px);color:#ff6b6b;margin:16px 0 6px">🏆</div>
  <div id="scoreList" style="display:flex;flex-direction:column;gap:6px;width:100%;align-items:center;overflow-y:auto;max-height:70vh;padding:0 8px"></div>
  <button class="btn btn-ghost backBtn" style="margin:12px 0" onclick="goScreen('sTitle')">↩ Volver</button>
</div>

<!-- ══════════ GAME ══════════ -->
<div class="screen" id="sGame">
  <div id="hud">
    <div class="hpill"><span class="lbl" id="hLvlLbl">LVL</span><span class="val" id="hLvl">1</span></div>
    <div class="hpill" id="hLives"></div>
    <div class="hpill"><span class="lbl" id="hScoreLbl">⭐</span><span class="val" id="hScore">0</span></div>
    <div class="hpill"><span class="lbl" id="hTimeLbl">⏱</span><span class="val" id="hTime">0s</span></div>
    <div class="hpill" id="hPU"></div>
    <div id="dbgBadge">🐛 DEBUG</div>
  </div>
  <div id="gameArea"><canvas id="cv"></canvas></div>
</div>

<!-- DPAD -->
<div id="dpad">
  <div class="dp">
    <div></div><div class="dpb" id="bU">⬆️</div><div></div>
    <div class="dpb" id="bL">⬅️</div><div class="dpb" style="background:#fffde7;border-color:#ffd93d">😶</div><div class="dpb" id="bR">➡️</div>
    <div></div><div class="dpb" id="bD">⬇️</div><div></div>
  </div>
</div>

<!-- OVERLAYS -->
<div class="ov" id="ovPause">
  <div class="ovbox">
    <div class="ovtitle" id="ovPauseTitle">⏸️ Pausa</div>
    <div class="ovbtns">
      <button class="btn btn-g" id="btnResume" onclick="resumeGame()">▶️ Continuar</button>
      <button class="btn btn-ghost" id="btnMenuP" onclick="quitGame()">🏠 Menú</button>
    </div>
  </div>
</div>
<div class="ov" id="ovWin">
  <div class="ovbox">
    <div class="ovtitle" id="ovWinTitle">🎉 ¡Genial!</div>
    <div class="ovsub" id="ovWinScore"></div>
    <div class="ovsub" id="ovWinBonus" style="color:#6bcb77;font-weight:700"></div>
    <div class="ovbtns">
      <button class="btn btn-g" id="btnNext" onclick="nextLevel()">➡️ Siguiente</button>
      <button class="btn btn-ghost" id="btnMenuW" onclick="quitGame()">🏠 Menú</button>
    </div>
  </div>
</div>
<div class="ov" id="ovDead">
  <div class="ovbox">
    <div class="ovtitle" id="ovDeadTitle">💀 ¡Atrapado!</div>
    <div class="ovsub" id="ovDeadScore"></div>
    <div class="ovsub" id="ovDeadLvl"></div>
    <div class="ovbtns">
      <button class="btn btn-r" id="btnRetry" onclick="retryLevel()">🔄 Reintentar</button>
      <button class="btn btn-ghost" id="btnMenuD" onclick="quitGame()">🏠 Menú</button>
    </div>
  </div>
</div>
<div id="phaseOv">
  <div class="phBig" id="phFace">😶</div>
  <div class="phText" id="phTxt">Nivel 1</div>
</div>

// ── AUDIO (Web Audio API — tiny synth sounds) ──
let AC = null;
function getAC(){ if(!AC) try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}; return AC; }

function playTone(freq, type, dur, vol=0.18, delay=0){
  const ac=getAC(); if(!ac) return;
  const o=ac.createOscillator(), g=ac.createGain();
  o.connect(g); g.connect(ac.destination);
  o.type=type; o.frequency.setValueAtTime(freq, ac.currentTime+delay);
  g.gain.setValueAtTime(vol, ac.currentTime+delay);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+delay+dur);
  o.start(ac.currentTime+delay); o.stop(ac.currentTime+delay+dur+0.01);
}
function playNoise(dur, vol=0.15){
  const ac=getAC(); if(!ac) return;
  const buf=ac.createBuffer(1,ac.sampleRate*dur,ac.sampleRate);
  const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
  const src=ac.createBufferSource(), g=ac.createGain();
  src.buffer=buf; src.connect(g); g.connect(ac.destination);
  g.gain.setValueAtTime(vol,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
  src.start(); src.stop(ac.currentTime+dur+0.01);
}

const SFX = {
  step()    { playTone(220,'sine',.04,.05); },
  reveal()  { playTone(523,'sine',.08,.2); playTone(659,'sine',.1,.2,.08); playTone(784,'sine',.15,.2,.16); },
  powerup() { [523,659,784,1047].forEach((f,i)=>playTone(f,'square',.1,.1,i*0.07)); },
  die()     { playNoise(.25,.25); playTone(150,'sawtooth',.4,.3,.05); },
  win()     { [523,659,784,1047,1319].forEach((f,i)=>playTone(f,'sine',.18,.18,i*0.09)); },
  freeze()  { playTone(800,'sine',.05,.15); playTone(600,'sine',.05,.15,.06); playTone(400,'sine',.15,.15,.12); },
  bomb()    { playNoise(.18,.3); playTone(80,'sawtooth',.3,.25,.04); },
};

// ── LEVEL CONFIG ──
// Level 1: 4 cols × 3 rows, 1 mummy
// Level 100: 12 cols × 9 rows, 8 mummies
// Linear interpolation
function getConfig(lvl){
  const t = (Math.min(lvl,100)-1)/99; // 0..1
  const isMob = isMobile();

  // Grid size — desktop: cols×rows, mobile portrait: swap to rows×cols
  const cols = Math.round(4  + t*(12-4));   // 4→12
  const rows = Math.round(3  + t*(9-3));    // 3→9

  const mummies  = Math.round(1 + t*(8-1)); // 1→8
  // Player steps/sec stays constant; mummy speed fraction increases
  const playerSPS = 4.5; // steps per second
  const mRatio    = 0.28 + t*0.72; // 0.28→1.0 of player speed

  const puChance = 0.10 + t*0.18; // 10%→28% chance per tomb

  // On mobile portrait, swap cols/rows so layout is taller than wide
  return isMob
    ? {lvl, cols:rows, rows:cols, mummies, playerSPS, mRatio, puChance}
    : {lvl, cols, rows,          mummies, playerSPS, mRatio, puChance};
}

function isMobile(){ return window.innerWidth < window.innerHeight || ('ontouchstart' in window && window.innerWidth < 700); }

    const done = sv.best[i]!=null;

    if(done)        b.classList.add('done');

    b.innerHTML = `<span class="lem">${done?'✅':open?PLAYER_FACES[(i-1)%PLAYER_FACES.length]:'🔒'}</span>${i}`;
    if(open) b.onclick = () => startGame(i);
    g.appendChild(b);
  }
}

// ════════════════════════════════════════
//  GAME ENGINE
// ════════════════════════════════════════
const cv  = document.getElementById('cv');
const ctx = cv.getContext('2d');
let G = null;

// ── GRID STRUCTURE ──
// Each tomb occupies a 3×3 block of cells.
// Corridors are the 1-cell gaps between tombs and at the border.
// Grid cell (gx,gy) where:
//   gx = 0 .. cols*4     (cols tombs → each needs 3 cells + 1 corridor)
//   gy = 0 .. rows*4
// Cell type: 0=corridor/path, 1=tomb interior
// Tomb at grid-slot (tc,tr) occupies pixel cells (tc*4+1, tr*4+1) to (tc*4+3, tr*4+3)

function buildGameGrid(cfg){
  const {cols,rows} = cfg;
  const GW = cols*4+1, GH = rows*4+1;
  // mark tomb cells
  const tomb = (gx,gy) => gx>=1 && gy>=1 && (gx-1)%4<3 && (gy-1)%4<3;
  // walkable = NOT tomb interior
  const walkable = (gx,gy) => gx>=0&&gx<GW&&gy>=0&&gy<GH && !tomb(gx,gy);

  // Build tomb list with contents
  const tombs = [];
  for(let tr=0;tr<rows;tr++){
    for(let tc=0;tc<cols;tc++){
      const gx=tc*4+1, gy=tr*4+1;
      let content;
      if(Math.random()<cfg.puChance){
        const pt=PU_TYPES[Math.floor(Math.random()*PU_TYPES.length)];
        content={emoji:PU[pt].emoji,pts:0,color:PU[pt].color,pu:pt};
      } else {
        const t=TREASURES[Math.floor(Math.random()*TREASURES.length)];
        content={emoji:t.e,pts:t.pts,color:t.c,pu:null};
      }
      tombs.push({
        tc,tr,gx,gy,
        sides:{top:false,bottom:false,left:false,right:false},
        visited:new Set(),
        revealed:false,content,revealT:0,
      });
    }
  }
  return {GW,GH,walkable,tombs};
}

// corridors adjacent to a tomb side (3 cells each)
function tombSideCells(t){
  const {gx,gy}=t;
  return {
    top:   [[gx,gy-1],[gx+1,gy-1],[gx+2,gy-1]],
    bottom:[[gx,gy+3],[gx+1,gy+3],[gx+2,gy+3]],
    left:  [[gx-1,gy],[gx-1,gy+1],[gx-1,gy+2]],
    right: [[gx+3,gy],[gx+3,gy+1],[gx+3,gy+2]],
  };
}

// ── CALC CELL SIZE ──
function calcCS(GW,GH){
  const isMob = isMobile();
  const aW = window.innerWidth;
  const aH = window.innerHeight - 42 - (isMob?144:0);
  return Math.max(10, Math.floor(Math.min(aW/GW, aH/GH)));
}

// ── START GAME ──
function startGame(lvl){
  goScreen('sGame');
  const cfg = getConfig(lvl);
  const {GW,GH,walkable,tombs} = buildGameGrid(cfg);
  const cs = calcCS(GW,GH);
  cv.width=GW*cs; cv.height=GH*cs;

  // Player start: top-left corridor (0,0)
  const pFace = PLAYER_FACES[Math.floor(Math.random()*PLAYER_FACES.length)];
  let faceTimer = 3; // seconds between face changes

  const player = {
    cx:0, cy:0,
    px:cs*0.5, py:cs*0.5,
    tx:cs*0.5, ty:cs*0.5,
    ox:cs*0.5, oy:cs*0.5,
    moving:false, stepT:0,
    stepDur: 1/cfg.playerSPS,
    dir:null, activeDir:null, queueDir:null,
    alive:true, deathAnim:0,
    face:pFace, faceTimer,
    invincible:false, invTime:0,
  };

  // Mummies — start from various corners/edges
  const corners=[
    [GW-1,GH-1],[GW-1,0],[0,GH-1],
    [Math.floor(GW/2),GH-1],[GW-1,Math.floor(GH/2)],
    [0,Math.floor(GH/2)],[Math.floor(GW/2),0],
    [Math.floor(GW*3/4),GH-1],
  ];
  const mummies = Array.from({length:cfg.mummies},(_,i)=>{
    const [scx,scy]=corners[i%corners.length];
    // ensure walkable start
    const cx=scx, cy=scy;
    const face=EVIL_FACES[i%EVIL_FACES.length];
    return {
      cx,cy,
      px:(cx+0.5)*cs, py:(cy+0.5)*cs,
      tx:(cx+0.5)*cs, ty:(cy+0.5)*cs,
      ox:(cx+0.5)*cs, oy:(cy+0.5)*cs,
      moving:false, stepT:0,
      stepDur: 1/(cfg.playerSPS*cfg.mRatio),
      baseDur: 1/(cfg.playerSPS*cfg.mRatio),
      dir:'UP', id:i, face,
      frozen:false, slow:false,
      dead:false, deathAnim:0,
    };
  });

  G = {
    cfg, lvl, cs, GW, GH, walkable, tombs,
    totalTombs:tombs.length, revealedTombs:0,
    player, mummies,
    lives:3, score:0, time:0,
    powerups:{}, particles:[],
    state:'playing', paused:false, lastTime:null,
    inputDir:null,
  };

  updateHUD(); updateLivesHUD(); updatePUHUD();
  if(DEBUG) document.getElementById('dbgBadge').style.display='flex';
  showPhase(`${T().lvlLabel} ${lvl}`, player.face, ()=>{
    G.state='playing';
    requestAnimationFrame(loop);
  });
}

// ── GAME LOOP ──
function loop(ts){
  if(!G||G.paused) return;
  if(G.lastTime===null) G.lastTime=ts;
  const dt=Math.min((ts-G.lastTime)/1000, 0.08);
  G.lastTime=ts;
  if(G.state!=='gameover') update(dt);
  render();
  if(G.state!=='gameover') requestAnimationFrame(loop);
}

// ── UPDATE ──
function update(dt){
  if(G.state==='dying'){
    G.player.deathAnim+=dt*2.5;
    if(G.player.deathAnim>=1){
      G.lives--;updateLivesHUD();
      if(G.lives<=0){ G.state='gameover'; setTimeout(showDead,350); }
      else respawn();
    }
    animMummies(dt); return;
  }
  if(G.state!=='playing') return;

  G.time+=dt;

  // Face rotation
  G.player.faceTimer-=dt;
  if(G.player.faceTimer<=0){
    G.player.face=PLAYER_FACES[Math.floor(Math.random()*PLAYER_FACES.length)];
    G.player.faceTimer=2+Math.random()*3;
  }

  tickPU();
  stepPlayer(dt);
  stepMummies(dt);
  checkHit();
  checkWin();
  updateHUD();
}

// ── POWERUPS ──
function tickPU(){
  const now=Date.now();
  for(const [type,end] of Object.entries(G.powerups)){
    if(now>=end){
      delete G.powerups[type];
      if(type==='freeze') G.mummies.forEach(m=>{if(!m.dead)m.frozen=false;});
      if(type==='slow')   G.mummies.forEach(m=>{if(!m.dead){m.slow=false;m.stepDur=m.baseDur;}});
      updatePUHUD();
    }
  }
  if(G.player.invincible){ G.player.invTime-=0.016; if(G.player.invTime<=0) G.player.invincible=false; }
}

// ── PLAYER MOVEMENT (tile-based, input-driven) ──
function stepPlayer(dt){
  const P=G.player;
  if(!P.alive) return;
  if(G.inputDir){ P.queueDir=G.inputDir; G.inputDir=null; }

  if(!P.moving){
    const want = P.queueDir || P.activeDir;
    if(!want) return;
    const nx=P.cx+DX[want], ny=P.cy+DY[want];
    if(G.walkable(nx,ny)){
      P.ox=P.px; P.oy=P.py;
      P.cx=nx; P.cy=ny;
      P.tx=(nx+0.5)*G.cs; P.ty=(ny+0.5)*G.cs;
      P.moving=true; P.stepT=0; P.dir=want; P.queueDir=null;
      SFX.step();
    } else {
      P.queueDir=null;
    }
  }
  if(P.moving){
    P.stepT=Math.min(1,P.stepT+dt/P.stepDur);
    const e=eio(P.stepT);
    P.px=lerp(P.ox,P.tx,e); P.py=lerp(P.oy,P.ty,e);
    if(P.stepT>=1){ P.px=P.tx; P.py=P.ty; P.moving=false; checkSides(); }
  }
}

// ── MUMMIES ──
function stepMummies(dt){ G.mummies.forEach(m=>stepMummy(m,dt)); }
function animMummies(dt){
  G.mummies.forEach(m=>{
    if(m.dead){ m.deathAnim=Math.min(1,m.deathAnim+dt*3); return; }
    if(m.moving){
      m.stepT=Math.min(1,m.stepT+dt/m.stepDur);
      m.px=lerp(m.ox,m.tx,eio(m.stepT)); m.py=lerp(m.oy,m.ty,eio(m.stepT));
      if(m.stepT>=1){ m.px=m.tx; m.py=m.ty; m.moving=false; }
    }
  });
}
function stepMummy(m,dt){
  if(m.dead){ m.deathAnim=Math.min(1,m.deathAnim+dt*3); return; }
  if(m.frozen) return;
  if(m.moving){
    m.stepT=Math.min(1,m.stepT+dt/m.stepDur);
    m.px=lerp(m.ox,m.tx,eio(m.stepT)); m.py=lerp(m.oy,m.ty,eio(m.stepT));
    if(m.stepT>=1){ m.px=m.tx; m.py=m.ty; m.moving=false; }
    return;
  }
  const P=G.player, opp=OPP[m.dir];
  const dirs=['UP','DOWN','LEFT','RIGHT'];
  let cands=dirs.filter(d=>d!==opp&&G.walkable(m.cx+DX[d],m.cy+DY[d]));
  if(!cands.length) cands=dirs.filter(d=>G.walkable(m.cx+DX[d],m.cy+DY[d]));
  if(!cands.length) return;
  let chosen;
  if(Math.random()<0.7){
    chosen=cands.reduce((b,d)=>{
      const dd=Math.abs(m.cx+DX[d]-P.cx)+Math.abs(m.cy+DY[d]-P.cy);
      const db=Math.abs(m.cx+DX[b]-P.cx)+Math.abs(m.cy+DY[b]-P.cy);
      return dd<db?d:b;
    });
  } else chosen=cands[Math.floor(Math.random()*cands.length)];
  m.ox=m.px; m.oy=m.py;
  m.cx+=DX[chosen]; m.cy+=DY[chosen];
  m.tx=(m.cx+0.5)*G.cs; m.ty=(m.cy+0.5)*G.cs;
  m.moving=true; m.stepT=0; m.dir=chosen;
}

// ── SIDE DETECTION ──
function checkSides(){
  const P=G.player;
  const key=`${P.cx},${P.cy}`;
  for(const t of G.tombs){
    if(t.revealed) continue;
    const isNew=!t.visited.has(key);
    if(isNew) t.visited.add(key);
    const sides=tombSideCells(t);
    for(const [side,cells] of Object.entries(sides)){
      if(t.sides[side]) continue;
      if(isNew){
        for(const [cx,cy] of cells){
          if(cx===P.cx&&cy===P.cy){
            G.score+=1;
            floatScore((cx+0.5)*G.cs,(cy+0.5)*G.cs,'+1','#b39ddb');
            break;
          }
        }
      }
      if(cells.every(([cx,cy])=>t.visited.has(`${cx},${cy}`))){
        t.sides[side]=true;
      }
    }
    if(t.sides.top&&t.sides.bottom&&t.sides.left&&t.sides.right) revealTomb(t);
  }
}

function revealTomb(t){
  t.revealed=true; t.revealT=Date.now(); G.revealedTombs++;
  const c=t.content, pts=(c.pts||0)+10;
  G.score+=pts;
  const wx=(t.gx+1.5)*G.cs, wy=(t.gy+1.5)*G.cs;
  floatScore(wx,wy,pts>0?`+${pts}`:`${pts}`,c.color);
  particles(wx,wy,c.color,10);
  SFX.reveal();
  if(c.pu) activatePU(c.pu);
}

function activatePU(type){
  SFX.powerup();
  if(type==='bomb'){
    const P=G.player; let k=0;
    G.mummies.forEach(m=>{ if(!m.dead&&Math.abs(m.cx-P.cx)+Math.abs(m.cy-P.cy)<=6){ killMummy(m); k++; } });
    particles(P.px,P.py,'#ff6b6b',18); floatScore(P.px,P.py,k?`💥×${k}`:'💥','#ff6b6b');
    SFX.bomb();
  } else {
    G.powerups[type]=Date.now()+PU[type].dur;
    if(type==='freeze'){ G.mummies.forEach(m=>{if(!m.dead)m.frozen=true;}); SFX.freeze(); }
    if(type==='slow')  G.mummies.forEach(m=>{if(!m.dead){m.slow=true;m.stepDur=m.baseDur*3;}});
    if(type==='invincible'){ G.player.invincible=true; G.player.invTime=PU[type].dur/1000; }
    updatePUHUD();
  }
}

function killMummy(m){
  m.dead=true; m.deathAnim=0;
  particles(m.px,m.py,'#ff6b6b',8);
  G.score+=50; floatScore(m.px,m.py,'+50','#ff6b6b');
}

// ── COLLISION ──
function checkHit(){
  if(!G.player.alive||G.player.invincible||G.state!=='playing') return;
  const P=G.player;
  for(const m of G.mummies){
    if(m.dead) continue;
    if((m.cx===P.cx&&m.cy===P.cy)||
       (Math.abs(m.px-P.px)<G.cs*0.4&&Math.abs(m.py-P.py)<G.cs*0.4)){
      playerDie(); return;
    }
  }
}
function playerDie(){
  if(G.state!=='playing') return;
  G.player.alive=false; G.player.deathAnim=0; G.state='dying';
  particles(G.player.px,G.player.py,'#ff6b6b',14);
  cv.style.animation='shake .35s ease'; setTimeout(()=>cv.style.animation='',350);
  SFX.die();
}
function respawn(){
  const P=G.player;
  P.cx=0;P.cy=0; P.px=P.ox=P.tx=G.cs*0.5; P.py=P.oy=P.ty=G.cs*0.5;
  P.moving=false;P.alive=true;P.deathAnim=0;
  P.activeDir=null;P.queueDir=null;
  P.invincible=true;P.invTime=2.5;
  G.state='playing';
}
function checkWin(){
  if(G.revealedTombs>=G.totalTombs&&G.state==='playing'){
    G.state='winning'; setTimeout(showWin,400);
  }
}

// ── RENDER ──
// Emoji offscreen cache — separate caches for normal and flipped
const _ec=new Map();
function getOfcEmoji(em, sz, flipH){
  const key=em+'_'+sz+(flipH?'_f':'');
  let ofc=_ec.get(key);
  if(!ofc){
    ofc=document.createElement('canvas');
    ofc.width=ofc.height=sz*2; // padding
    const c=ofc.getContext('2d');
    if(flipH){ c.translate(sz*2,0); c.scale(-1,1); }
    c.font=`${sz}px serif`; c.textAlign='center'; c.textBaseline='middle';
    c.fillText(em,sz,sz);
    _ec.set(key,ofc);
  }
  return ofc;
}

function drawEmoji(em,x,y,sz,flipH=false,alpha=1,glow=null){
  const px=Math.max(8,Math.round(sz)); // no 2× upscale — use exact size
  const ofc=getOfcEmoji(em,px,flipH);
  const hw=ofc.width/2;
  ctx.save();
  ctx.globalAlpha=alpha;
  if(glow){ctx.shadowColor=glow;ctx.shadowBlur=12;}
  ctx.translate(x,y);
  ctx.drawImage(ofc,-hw,-hw,ofc.width,ofc.height);
  ctx.restore();
  ctx.globalAlpha=1;ctx.shadowBlur=0;ctx.shadowColor='transparent';
}

// Face emojis are symmetric vertically (UP/DOWN look same) — only flip horizontally for LEFT
function dirFlip(dir){ return dir==='LEFT'; }

function render(){
  if(!G) return;
  const {cs,GW,GH,tombs,player,mummies,particles:pts}=G;
  const now=Date.now();
  ctx.clearRect(0,0,cv.width,cv.height);

  // ── Background checkerboard ──
  for(let y=0;y<GH;y++){
    for(let x=0;x<GW;x++){
      ctx.fillStyle=(x+y)%2===0?'#fff9e6':'#fff3cd';
      ctx.fillRect(x*cs,y*cs,cs,cs);
    }
  }

  // ── Tombs ──
  for(const t of tombs) drawTomb(t,cs,now);

  // ── Walked corridors ──
  for(const t of tombs){
    if(t.revealed) continue;
    const sides=tombSideCells(t);
    for(const [side,cells] of Object.entries(sides)){
      for(const [cx,cy] of cells){
        if(!t.visited.has(`${cx},${cy}`)) continue;
        const done=t.sides[side];
        ctx.fillStyle=done?'rgba(107,203,119,0.45)':'rgba(255,217,61,0.45)';
        ctx.fillRect(cx*cs+1,cy*cs+1,cs-2,cs-2);
        if(cs>=14){
          ctx.fillStyle=done?'#15803d':'#92400e';
          ctx.font=`bold ${Math.max(7,cs*0.38)}px sans-serif`;
          ctx.textAlign='center';ctx.textBaseline='middle';
          ctx.fillText(done?'✓':'·',(cx+0.5)*cs,(cy+0.5)*cs);
        }
      }
    }
  }

  // ── PU screen tints ──
  if(G.powerups.freeze){ctx.fillStyle='rgba(79,195,247,0.09)';ctx.fillRect(0,0,cv.width,cv.height);}
  if(G.powerups.invincible){ctx.fillStyle=`rgba(255,217,61,${0.06+Math.sin(now*.006)*.04})`;ctx.fillRect(0,0,cv.width,cv.height);}

  // ── Player ──
  if(player.alive||G.state==='dying'){
    const dead=G.state==='dying';
    const alpha=dead?Math.max(0,1-player.deathAnim):1;
    const scale=dead?1+player.deathAnim*1.8:1;
    // Invincibility blink (flash every 110ms)
    const blink=player.invincible&&Math.floor(now/110)%2===0;
    const flash=blink?'#ffd93d':null;
    const sz=cs*0.55*scale; // ← smaller: 55% of cell
    const flip=dirFlip(player.dir);
    drawEmoji(player.face,player.px,player.py,sz,flip,alpha,flash);
  }

  // ── Mummies ──
  for(const m of G.mummies){
    if(m.dead&&m.deathAnim>=1) continue;
    const alpha=m.dead?Math.max(0,1-m.deathAnim):1;
    const pulse=1+Math.sin(now*0.0022+m.id*1.3)*0.05;
    const scale=m.dead?1+m.deathAnim:pulse;
    const glow=m.frozen?'#4fc3f7':m.slow?'#6bcb77':null;
    const sz=cs*0.52*scale; // ← smaller: 52% of cell
    drawEmoji(m.face,m.px,m.py,sz,dirFlip(m.dir),alpha,glow);
    if(m.frozen&&cs>=14) drawEmoji('❄️',m.px+cs*0.26,m.py-cs*0.26,cs*0.24,false,alpha,null);
  }

  // ── Particles ──
  for(let i=pts.length-1;i>=0;i--){
    const p=pts[i];
    p.x+=p.vx*0.016; p.y+=p.vy*0.016; p.life-=0.025;
    if(p.life<=0){pts.splice(i,1);continue;}
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  document.getElementById('hTime').textContent=Math.floor(G.time)+'s';
}

const PASTEL_TOMB = ['#e9d5ff','#bfdbfe','#bbf7d0','#fde68a','#fecaca','#fed7aa'];
function drawTomb(t,cs,now){
  const {gx,gy,revealed,sides,content,revealT}=t;
  const px=gx*cs,py=gy*cs,tw=3*cs,th=3*cs;
  const cx=px+tw/2, cy=py+th/2;
  const r=cs*0.25;
  const col=PASTEL_TOMB[(t.tc+t.tr*3)%PASTEL_TOMB.length];

  if(!revealed){
    // shadow
    ctx.fillStyle='rgba(0,0,0,0.07)';
    rrect(px+3,py+4,tw-4,th-4,r); ctx.fill();
    // body
    ctx.fillStyle=col;
    rrect(px+1,py+1,tw-3,th-3,r); ctx.fill();
    // border
    ctx.strokeStyle='rgba(0,0,0,0.18)'; ctx.lineWidth=Math.max(1.5,cs*0.07);
    rrect(px+1,py+1,tw-3,th-3,r); ctx.stroke();
    // inner arch
    ctx.fillStyle='rgba(255,255,255,0.45)';
    rrect(px+cs*0.35,py+cs*0.3,cs*1.3,cs*1.1,r*0.6); ctx.fill();
    // tomb emoji
    if(cs>=12) drawEmoji('🪦',cx,cy+cs*0.08,cs*0.62,false,1,null);
    // 4 side dots
    const dr=Math.max(3,cs*0.13);
    [[cx,py+cs*0.18,'top'],[cx,py+th-cs*0.18,'bottom'],[px+cs*0.18,cy,'left'],[px+tw-cs*0.18,cy,'right']].forEach(([sx,sy,s])=>{
      ctx.beginPath();ctx.arc(sx,sy,dr,0,Math.PI*2);
      ctx.fillStyle=sides[s]?'#22c55e':'rgba(0,0,0,0.18)';ctx.fill();
      if(sides[s]){ctx.strokeStyle='#15803d';ctx.lineWidth=1.5;ctx.stroke();}
    });
  } else {
    const age=Math.min(1,(now-revealT)/300);
    ctx.globalAlpha=0.4*age;
    ctx.fillStyle='#f8fafc';
    rrect(px+1,py+1,tw-3,th-3,r); ctx.fill();
    ctx.globalAlpha=age;
    if(cs>=12) drawEmoji(content.emoji,cx,cy,cs*0.72,false,age,null);
    ctx.globalAlpha=1;
  }
}

function rrect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

// ── PARTICLES ──
function particles(x,y,color,n=8){
  for(let i=0;i<n;i++){
    const a=Math.PI*2*i/n+Math.random()*.5, sp=50+Math.random()*100;
    G.particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:2+Math.random()*3.5,color,life:1});
  }
}

// ── FLOAT SCORE ──
function floatScore(x,y,txt,color){
  const el=document.createElement('div'); el.className='fscore';
  const rc=cv.getBoundingClientRect();
  el.style.left=(rc.left+x)+'px'; el.style.top=(rc.top+y)+'px'; el.style.color=color||'#ffd93d';
  el.textContent=txt; document.body.appendChild(el); setTimeout(()=>el.remove(),1100);
}

// ── HUD ──
function updateHUD(){
  if(!G) return;
  document.getElementById('hLvl').textContent=G.lvl;
  document.getElementById('hScore').textContent=G.score.toLocaleString();
}
function updateLivesHUD(){
  const el=document.getElementById('hLives'); el.innerHTML='';
  for(let i=0;i<3;i++){
    const s=document.createElement('span'); s.className='hlife'+(i>=G.lives?' lost':'');
    s.textContent='❤️'; el.appendChild(s);
  }
}
function updatePUHUD(){
  const el=document.getElementById('hPU'); el.innerHTML='';
  for(const [t] of Object.entries(G?.powerups||{})){
    const s=document.createElement('span'); s.className='hpu'; s.textContent=PU[t].emoji; el.appendChild(s);
  }
}

// ── WIN / LOSE ──
function showWin(){
  SFX.win();
  const t=T();
  const bonus=Math.max(0,300-Math.floor(G.time)*2);
  G.score+=bonus;
  if(G.lvl>=sv.maxLevel) sv.maxLevel=Math.min(100,G.lvl+1);
  if(!sv.best[G.lvl]||G.score>sv.best[G.lvl]) sv.best[G.lvl]=G.score;
  sv.scores.push({level:G.lvl,score:G.score,date:new Date().toLocaleDateString()});
  if(sv.scores.length>50) sv.scores.shift();
  save();
  document.getElementById('ovWinScore').textContent=`${t.winScore} ${G.score.toLocaleString()}`;
  document.getElementById('ovWinBonus').textContent=bonus>0?`${t.winBonus} +${bonus}`:'';
  document.getElementById('btnNext').style.display=G.lvl<100?'':'none';
  showPhase(t.lvlClear.replace('{n}',G.lvl),'🎉',()=>document.getElementById('ovWin').classList.add('on'));
}
function showDead(){
  const t=T();
  document.getElementById('ovDeadScore').textContent=`${t.winScore} ${G.score.toLocaleString()}`;
  document.getElementById('ovDeadLvl').textContent=`${t.lvlLabel} ${G.lvl}`;
  document.getElementById('ovDead').classList.add('on');
}
function buildScores(){
  const t=T();
  const el = document.getElementById('scoreList'); el.innerHTML='';
  const list = sv.scores.slice().sort((a,b)=>b.score-a.score).slice(0,10);
  if(!list.length){ el.innerHTML=`<div style="color:#9ca3af;font-size:13px">${t.noScores}</div>`; return; }
  list.forEach((s,i)=>{
    const r=document.createElement('div'); r.className='sc-row';
    const m=['🥇','🥈','🥉'];
    r.innerHTML=`<span class="sc-pos">${m[i]||(i+1)+'º'}</span><span>${t.lvlLabel} ${s.level}</span><span style="color:#9ca3af;font-size:11px">${s.date}</span><span class="sc-pts">${s.score.toLocaleString()}</span>`;
    el.appendChild(r);
  });
}
function hideOvs(){ ['ovPause','ovWin','ovDead'].forEach(id=>document.getElementById(id).classList.remove('on')); }
function nextLevel()  { hideOvs(); startGame(G.lvl+1); }
function retryLevel() { hideOvs(); startGame(G.lvl); }
function quitGame()   { hideOvs(); G=null; goScreen('sTitle'); }
function resumeGame() { hideOvs(); G.paused=false; G.lastTime=null; requestAnimationFrame(loop); }

// ── PHASE OVERLAY ──
function showPhase(txt,face,cb){
  const ov=document.getElementById('phaseOv');
  document.getElementById('phFace').textContent=face;
  document.getElementById('phTxt').textContent=txt;
  ov.style.background='rgba(255,249,240,0.92)';
  ov.classList.add('on');
  setTimeout(()=>{
    ov.style.transition='background .5s';
    ov.style.background='rgba(255,249,240,0)';
    setTimeout(()=>{ ov.classList.remove('on'); ov.style.transition=''; if(cb)cb(); },500);
  },1400);
}

// ── INPUT ──
document.addEventListener('keydown',e=>{
  if(KM[e.key]){
    e.preventDefault();
    if(!G||G.state!=='playing') return;
    G.player.activeDir=KM[e.key];
    G.player.queueDir=KM[e.key];
  }
  if(e.key==='Escape'||e.key==='p'||e.key==='P') togglePause();
});
document.addEventListener('keyup',e=>{
  if(KM[e.key]&&G?.player&&G.player.activeDir===KM[e.key]) G.player.activeDir=null;
});
function togglePause(){
  if(!G) return;
  G.paused=!G.paused;
  if(G.paused) document.getElementById('ovPause').classList.add('on');
  else resumeGame();
}
['bU','bD','bL','bR'].forEach((id,i)=>{
  const btn=document.getElementById(id); if(!btn) return;
  const d=['UP','DOWN','LEFT','RIGHT'][i];
  const press=e=>{ e.preventDefault(); if(G?.state==='playing'){ G.player.activeDir=d; G.player.queueDir=d; } };
  const rel=e=>{ e.preventDefault(); if(G?.player&&G.player.activeDir===d) G.player.activeDir=null; };
  btn.addEventListener('touchstart',press,{passive:false});
  btn.addEventListener('touchend',rel,{passive:false});
  btn.addEventListener('touchcancel',rel,{passive:false});
  btn.addEventListener('mousedown',press);
  btn.addEventListener('mouseup',rel);
  btn.addEventListener('mouseleave',rel);
});
let swS=null;
cv.addEventListener('touchstart',e=>{swS={x:e.touches[0].clientX,y:e.touches[0].clientY};},{passive:true});
cv.addEventListener('touchend',e=>{
  if(!swS||G?.state!=='playing') return;
  const dx=e.changedTouches[0].clientX-swS.x, dy=e.changedTouches[0].clientY-swS.y;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>16) G.player.queueDir=dx>0?'RIGHT':'LEFT';
  else if(Math.abs(dy)>16) G.player.queueDir=dy>0?'DOWN':'UP';
  swS=null;
},{passive:true});

// ── RESIZE ──
window.addEventListener('resize',()=>{
  if(!G||G.state==='gameover') return;
  const cs=calcCS(G.GW,G.GH);
  if(cs===G.cs) return;
  const sx=cs/G.cs; G.cs=cs;
  cv.width=G.GW*cs; cv.height=G.GH*cs;
  _ec.clear();
  const rs=o=>{ o.px*=sx;o.py*=sx;o.tx*=sx;o.ty*=sx;o.ox*=sx;o.oy*=sx; };
  rs(G.player); G.mummies.forEach(rs);
});

// ── HELPERS ──
const lerp=(a,b,t)=>a+(b-a)*t;
const eio=t=>t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
